                                                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                                                    {/* 正常 */}
                                                    <div style={{ display: 'flex', alignItems: 'center', padding: '12px 16px', background: '#f6ffed', borderRadius: 6, border: '1px solid #d9f7be' }}>
                                                        <CheckCircleOutlined style={{ color: '#52c41a', fontSize: 16, marginRight: 10 }} />
                                                        <div style={{ flex: 1 }}>
                                                            <Text strong>正常</Text>
                                                            <Text type="secondary" style={{ fontSize: 12, marginLeft: 8 }}>业务正常</Text>
                                                        </div>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                            <Text>0 ~</Text>
                                                            <Form.Item name="normalMax" style={{ marginBottom: 0 }}>
                                                                <InputNumber min={0} max={200} style={{ width: 70 }} />
                                                            </Form.Item>
                                                            <Text type="secondary">分</Text>
                                                        </div>
                                                    </div>

                                                    {/* 已告警 */}
                                                    <div style={{ display: 'flex', alignItems: 'center', padding: '12px 16px', background: '#fffbe6', borderRadius: 6, border: '1px solid #ffe58f' }}>
                                                        <WarningOutlined style={{ color: '#faad14', fontSize: 16, marginRight: 10 }} />
                                                        <div style={{ flex: 1 }}>
                                                            <Text strong>已告警</Text>
                                                            <Text type="secondary" style={{ fontSize: 12, marginLeft: 8 }}>需关注</Text>
                                                        </div>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                            <Form.Item name="warnMin" style={{ marginBottom: 0 }}>
                                                                <InputNumber min={0} max={200} style={{ width: 70 }} />
                                                            </Form.Item>
                                                            <Text>~</Text>
                                                            <Form.Item name="warnMax" style={{ marginBottom: 0 }}>
                                                                <InputNumber min={0} max={200} style={{ width: 70 }} />
                                                            </Form.Item>
                                                            <Text type="secondary">分</Text>
                                                        </div>
                                                    </div>

                                                    {/* 延迟观察 */}
                                                    <div style={{ display: 'flex', alignItems: 'center', padding: '12px 16px', background: '#fff7e6', borderRadius: 6, border: '1px solid #ffd591' }}>
                                                        <ExclamationCircleOutlined style={{ color: '#fa8c16', fontSize: 16, marginRight: 10 }} />
                                                        <div style={{ flex: 1 }}>
                                                            <Text strong>延迟观察</Text>
                                                            <Text type="secondary" style={{ fontSize: 12, marginLeft: 8 }}>出款延迟</Text>
                                                        </div>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                            <Form.Item name="limitMin" style={{ marginBottom: 0 }}>
                                                                <InputNumber min={0} max={200} style={{ width: 70 }} />
                                                            </Form.Item>
                                                            <Text>~</Text>
                                                            <Form.Item name="limitMax" style={{ marginBottom: 0 }}>
                                                                <InputNumber min={0} max={200} style={{ width: 70 }} />
                                                            </Form.Item>
                                                            <Text type="secondary">分</Text>
                                                        </div>
                                                    </div>

                                                    {/* 熔断 */}
                                                    <div style={{ display: 'flex', alignItems: 'center', padding: '12px 16px', background: '#fff1f0', borderRadius: 6, border: '1px solid #ffccc7' }}>
                                                        <StopOutlined style={{ color: '#ff4d4f', fontSize: 16, marginRight: 10 }} />
                                                        <div style={{ flex: 1 }}>
                                                            <Text strong>熔断</Text>
                                                            <Text type="secondary" style={{ fontSize: 12, marginLeft: 8 }}>暂停出款</Text>
                                                        </div>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                            <Form.Item name="fuseMin" style={{ marginBottom: 0 }}>
                                                                <InputNumber min={0} max={200} style={{ width: 70 }} />
                                                            </Form.Item>
                                                            <Text type="secondary">分及以上</Text>
                                                        </div>
                                                    </div>
                                                </div>
                                            </Form>
                                        </div>
                                    )
                                },
                                {
                                    key: 'rules',
                                    label: '规则说明',
                                    children: (
                                        <div style={{ paddingTop: 8 }}>
                                            <div style={{ padding: '10px 12px', background: '#f5f5f5', borderRadius: 6, marginBottom: 16 }}>
                                                <Text type="secondary" style={{ fontSize: 12 }}>
                                                    V1 规则参数已锁定，仅供查看
                                                </Text>
                                            </div>
                                            
                                            {/* 规则1: 单笔金额异常 */}
                                            <div style={{ padding: 16, background: '#fafafa', borderRadius: 6, marginBottom: 12 }}>
                                                <div style={{ display: 'flex', alignItems: 'center', marginBottom: 12 }}>
                                                    <Text strong>1. 单笔金额异常</Text>
                                                    <Tag color="green" style={{ marginLeft: 8 }}>已启用</Tag>
                                                </div>
                                                <div style={{ display: 'grid', gridTemplateColumns: '80px 1fr', gap: '8px 12px', fontSize: 13 }}>
                                                    <Text type="secondary">触发条件</Text>
                                                    <Text>单笔出款超过该商户历史正常上限</Text>
                                                    <Text type="secondary">风险分数</Text>
                                                    <Text>1.5~2倍→30分，2~3倍→50分，3倍以上→70分</Text>
                                                    <Text type="secondary">备注</Text>
                                                    <Text>新商户（不足50笔）分数减半</Text>
                                                </div>
                                            </div>
                                            
                                            {/* 规则2: 累计金额异常 */}
                                            <div style={{ padding: 16, background: '#fafafa', borderRadius: 6 }}>
                                                <div style={{ display: 'flex', alignItems: 'center', marginBottom: 12 }}>
                                                    <Text strong>2. 累计金额异常</Text>
                                                    <Tag color="green" style={{ marginLeft: 8 }}>已启用</Tag>
                                                </div>
                                                <div style={{ display: 'grid', gridTemplateColumns: '80px 1fr', gap: '8px 12px', fontSize: 13 }}>
                                                    <Text type="secondary">触发条件</Text>
                                                    <Text>10分钟累计出款超过历史同时段的2倍</Text>
                                                    <Text type="secondary">风险分数</Text>
                                                    <Text>2~3倍→30分，3~5倍→50分，5倍以上→70分</Text>
                                                    <Text type="secondary">最低要求</Text>
                                                    <Text>金额≥5000 USDT，笔数≥3笔</Text>
                                                </div>
                                            </div>
                                        </div>
                                    )
                                }                            ]}
                        />
                    </Modal>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
