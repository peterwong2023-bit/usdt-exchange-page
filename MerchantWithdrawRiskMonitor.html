        .ant-table-tbody > tr > td { font-size: 15px; padding: 18px 16px !important; }

        .ant-select { font-size: 14px; }
        .ant-select-item { font-size: 14px; }

        .ant-tag { font-size: 13px; padding: 3px 10px; }

        /* === 顶部概览卡片 === */
        .overview-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);

            margin: -24px -24px 24px -24px;
            border-radius: 0 0 24px 24px;

        .overview-title {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .overview-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 28px;
            background: linear-gradient(180deg, #00d9ff 0%, #00ff88 100%);
            border-radius: 2px;

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .stat-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;

        .stat-card:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .stat-card-icon {
            position: absolute;
            right: 16px;
            top: 16px;
            font-size: 48px;
            opacity: 0.1;
            color: #fff;
        }
        .stat-card-value {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            margin-bottom: 8px;
        }
        .stat-card-label {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
        }
        .stat-card.fuse { border-left: 4px solid #ff4d4f; }
        .stat-card.fuse .stat-card-value { color: #ff7875; }
        .stat-card.limit { border-left: 4px solid #fa8c16; }
        .stat-card.limit .stat-card-value { color: #ffc069; }
        .stat-card.warn { border-left: 4px solid #fadb14; }
        .stat-card.warn .stat-card-value { color: #fff566; }
        .stat-card.normal { border-left: 4px solid #52c41a; }
        .stat-card.normal .stat-card-value { color: #95de64; }
        
        /* 实时脉动指示器 */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(82,196,26,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #52c41a;
            font-weight: 600;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #52c41a;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .row-fuse { background-color: #fff1f0 !important; }
        .row-limit { background-color: #fff7e6 !important; }
        .row-warn { background-color: #fffbe6 !important; }
        .row-normal { background-color: #fff !important; }

            font-weight: 500;
            display: inline-flex;
            align-items: center;

        .level-limit { background: linear-gradient(135deg, #fff7e6 0%, #ffd591 100%); color: #d46b08; border: 1px solid #ffbb96; }
        .level-fuse { background: linear-gradient(135deg, #fff1f0 0%, #ffccc7 100%); color: #cf1322; border: 1px solid #ffa39e; }

        .rule-card-miss { border-left: 4px solid #d9d9d9; background: #fafafa; }

            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);

        .strategy-option { padding: 12px; border: 1px solid #d9d9d9; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .strategy-option:hover { border-color: #1890ff; background: #f0f5ff; }
        .strategy-option.selected { border-color: #1890ff; background: #e6f7ff; }
        
        /* 风险分仪表盘 */
        .score-gauge { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
        .score-gauge-inner { position: relative; }
        .score-gauge-label { text-align: left; }

        .ant-progress-circle .ant-progress-text { font-weight: 700 !important; }

            font-size: 12px !important;
            padding: 8px 12px !important;
            color: #8c8c8c !important;

            font-size: 13px !important;

        .snapshot-cell { display: flex; flex-direction: column; gap: 5px; }
        .snapshot-item { display: flex; align-items: baseline; font-size: 14px; }
        .snapshot-label { color: #999; font-size: 13px; white-space: nowrap; margin-right: 5px; }

        .snapshot-value.high { color: #cf1322; }     /* 3-5x 橙红 */
        .snapshot-value.medium { color: #d46b08; }   /* 2-3x 橙色 */
        .snapshot-value.low { color: #8c8c8c; }      /* <2x 灰色 */

        .addr-cell.high .addr-label { background: linear-gradient(135deg, #fff1f0 0%, #ffccc7 100%); color: #cf1322; }
        .addr-cell.medium .addr-value { color: #d46b08; }

        .addr-cell.low .addr-value { color: #8c8c8c; }
        .addr-cell.low .addr-label { background: #f5f5f5; color: #8c8c8c; }

        /* 看板 KPI 卡片美化 */
        .kpi-card { 
            border-radius: 16px;

            box-shadow: 0 4px 20px rgba(0,0,0,0.06);

        .kpi-card .ant-statistic-title { color: #8c8c8c; font-size: 13px; margin-bottom: 8px; }
        .kpi-card .ant-statistic-content { display: flex; align-items: baseline; }
        .kpi-card .kpi-icon { position: absolute; right: 16px; top: 16px; font-size: 28px; opacity: 0.12; }

        /* 趋势图美化 */
        .trend-chart-container { 
            height: 240px; 
            display: flex; 
            align-items: flex-end; 
            justify-content: space-between; 
            padding: 24px 20px 40px; 
            background: linear-gradient(180deg, #fff 0%, #fafafa 100%); 
            border-radius: 12px; 
            position: relative; 
        }
        .trend-bar { 
            width: 28px; 
            border-radius: 6px 6px 0 0; 
            position: relative; 
            transition: all 0.3s ease; 
            cursor: pointer; 
        }
        .trend-bar:hover { filter: brightness(1.1); transform: scaleY(1.02); }
        .trend-bar::after { content: attr(data-value); position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 600; color: #595959; opacity: 0; transition: opacity 0.3s; }
        .trend-bar:hover::after { opacity: 1; }
        
        /* 审计日志详情块美化 */
        .audit-detail-block { padding: 16px; background: #fafafa; border-radius: 12px; border: 1px solid #f0f0f0; }
        .audit-detail-label { color: #8c8c8c; font-size: 11px; margin-right: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .audit-detail-value { color: #262626; font-size: 13px; }
        
        /* 审计表格行高优化 */
        .audit-table-v2 .ant-table-cell { padding: 14px 16px !important; }
        .audit-table-v2 .ant-table-row:hover { cursor: pointer; }
        
        /* 主内容区卡片 */
        .main-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
            overflow: hidden;

            background: #fff;
            padding: 0 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .custom-tabs .ant-tabs-tab {

        .custom-tabs .ant-tabs-tab:hover { color: #1890ff; }
        .custom-tabs .ant-tabs-tab-active { font-weight: 600; }
        .custom-tabs .ant-tabs-ink-bar { height: 3px; border-radius: 2px; }
        
        /* 表格美化 */
        .ant-table { border-radius: 12px; overflow: hidden; }
        .ant-table-thead > tr > th { 
            background: linear-gradient(180deg, #fafafa 0%, #f5f5f5 100%) !important;

        /* 按钮美化 */

            background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
            border: none;
            box-shadow: 0 4px 12px rgba(24,144,255,0.3);

            if (isNaN(ratio)) return 'low';
            if (ratio >= 5) return 'critical';  // ≥5x 深红（高危）
            if (ratio >= 3) return 'high';      // 3-5x 橙红（异常）

        // ========== 迷你趋势曲线组件 (Sparkline) ==========
        const TrendSparkline = ({ data, threshold = 3, width = 80, height = 28 }) => {
            if (!data || data.length === 0) return null;
            
            const values = data.map(d => d.ratio);
            const maxVal = Math.max(...values, threshold);
            const minVal = Math.min(...values, 0);
            const range = maxVal - minVal || 1;
            
            const padding = 2;
            const innerW = width - padding * 2;
            const innerH = height - padding * 2;
            
            // 生成曲线路径
            const points = values.map((v, i) => ({
                x: padding + (i / (values.length - 1)) * innerW,
                y: padding + innerH - ((v - minVal) / range) * innerH
            }));
            
            // 生成平滑曲线 (使用二次贝塞尔)
            let pathD = `M ${points[0].x} ${points[0].y}`;
            for (let i = 1; i < points.length; i++) {
                const prev = points[i - 1];
                const curr = points[i];
                const cpX = (prev.x + curr.x) / 2;
                pathD += ` Q ${prev.x + (cpX - prev.x) * 0.5} ${prev.y}, ${cpX} ${(prev.y + curr.y) / 2}`;
                pathD += ` Q ${cpX + (curr.x - cpX) * 0.5} ${curr.y}, ${curr.x} ${curr.y}`;
            }
            
            // 阈值线 Y 坐标
            const thresholdY = padding + innerH - ((threshold - minVal) / range) * innerH;
            
            // 判断趋势方向和颜色
            const lastVal = values[values.length - 1];
            const firstVal = values[0];
            const isRising = lastVal > firstVal;
            const isAboveThreshold = lastVal >= threshold;
            const strokeColor = isAboveThreshold ? '#ff4d4f' : (isRising ? '#faad14' : '#52c41a');

                            y1={thresholdY}

                    .sort((a, b) => new Date(a.trigger_time) - new Date(b.trigger_time));
            };

            // 获取 Case 最终状态（含风险等级）
            const getCaseFinalStatus = (caseId) => {
                const timeline = getCaseTimeline(caseId);
                if (timeline.length === 0) return { status: '未知', stopWithdraw: null, riskLevel: null };
                const last = timeline[timeline.length - 1];
                const stopWithdraw = last.snapshot?.stop_withdraw;
                let status = '未知';
                let riskLevel = null;
                if (last.action_type === 'ADMIN_UNFREEZE' && last.result === 'SUCCESS') {
                    status = '已解封';
                    riskLevel = last.snapshot?.risk_level_after || 'WARN';
                } else if (last.action_type.includes('FUSE')) {
                    status = '熔断中';
                    riskLevel = 'FUSE';
                }
                return { status, stopWithdraw, riskLevel };
            };
            
            // 风险等级标签配置
            const RISK_LEVEL_LABEL = {
                NORMAL: { text: '正常', color: 'success' },
                WARN: { text: '警告', color: 'warning' },
                LIMIT: { text: '限制', color: 'orange' },
                FUSE: { text: '熔断', color: 'error' }
            };

            const showDetail = (record) => {
                setSelectedRecord(record);
                setDrawerVisible(true);
            };

            const handleRemark = (record) => {
                setRemarkTarget(record);
                setRemarkInput(record.remark || '');
                setRemarkModalVisible(true);
            };

            const confirmRemark = () => {
                if (remarkTarget) {
                    message.success('备注已保存');
                }
                setRemarkModalVisible(false);
                setRemarkTarget(null);
                setRemarkInput('');
            };

            const resetFilters = () => {
                setFilters({ merchant: '', dateRange: null, actionTypes: [], actorType: 'ALL', hasRemark: 'ALL' });
            };

            // 列定义（审计级）
            const columns = [
                { 
                    title: '时间', 
                    dataIndex: 'trigger_time', 
                    width: 160,
                    render: v => <Text style={{ fontSize: 13, fontFamily: 'monospace', whiteSpace: 'nowrap' }}>{v}</Text>
                },
                { 
                    title: '商户', 
                    key: 'merchant', 
                    width: 140,
                    render: (_, r) => (
                        <div style={{ lineHeight: 1.4 }}>
                            <Text strong style={{ fontSize: 14, display: 'block' }}>{r.merchant_name}</Text>
                            <Text type="secondary" style={{ fontSize: 12 }}>{r.merchant_id}</Text>
                        </div>
                    )
                },
                { 
                    title: '动作类型', 
                    dataIndex: 'action_type', 
                    width: 105,
                    align: 'center',
                    render: v => {
                        const cfg = ACTION_TYPE_CONFIG[v] || {};
                        const IconComp = cfg.icon;
                        return <Tag icon={IconComp && <IconComp />} color={cfg.color} style={{ fontSize: 12, margin: 0 }}>{cfg.label || v}</Tag>;
                    }
                },
                { 
                    title: '执行主体', 
                    key: 'actor', 
                    width: 170,
                    render: (_, r) => (
                        <div style={{ lineHeight: 1.4 }}>
                            <Space size={4}>
                                <Badge status={r.actor_type === 'SYSTEM' ? 'default' : 'success'} />
                                <Text style={{ fontSize: 14 }}>{r.actor_name}</Text>
                            </Space>
                            {r.actor_role && <div><Text type="secondary" style={{ fontSize: 12, marginLeft: 14 }}>{r.actor_role}</Text></div>}
                        </div>
                    )
                },
                { 
                    title: '结果', 
                    dataIndex: 'result', 
                    width: 65,
                    align: 'center',
                    render: v => v === 'SUCCESS' 
                        ? <Tag color="success" style={{ fontSize: 12, margin: 0 }}>成功</Tag> 
                        : <Tag color="error" style={{ fontSize: 12, margin: 0 }}>失败</Tag>
                },
                { 
                    title: '风险快照', 
                    key: 'snapshot', 
                    width: 280,
                    render: (_, r) => {
                        const snap = r.snapshot || {};
                        const top2 = snap.top2_rules || [];
                        const isUnfreeze = r.action_type === 'ADMIN_UNFREEZE';
                        const score = isUnfreeze ? snap.score_after : snap.score;
                        const scoreBefore = isUnfreeze ? snap.score_before : null;
                        return (
                            <div style={{ fontSize: 13, lineHeight: 1.5 }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                    {isUnfreeze ? (
                                        <span>
                                            分数: <Text type="secondary" delete style={{ fontSize: 12 }}>{scoreBefore}</Text>
                                            <span style={{ margin: '0 4px', color: '#999' }}>→</span>
                                            <Text strong style={{ color: '#fa8c16' }}>{score}</Text>
                                        </span>
                                    ) : (
                                        <span>分数: <Text strong type={score >= 100 ? 'danger' : undefined}>{score}</Text></span>
                                    )}
                                    <Tag color={snap.stop_withdraw ? 'error' : 'success'} style={{ fontSize: 11, margin: 0, padding: '0 6px' }}>{snap.stop_withdraw ? '🔴 暂停自动出款' : '🟢 出款正常'}</Tag>
                                </div>
                                {top2.length > 0 && (
                                    <div style={{ color: '#8c8c8c', fontSize: 12, marginTop: 2 }}>
                                        Top2: {top2.map(t => `${t.name} ${t.strength}`).join(' / ')}
                                    </div>
                                )}
                            </div>
                        );
                    }
                },
                { 
                    title: '备注', 
                    dataIndex: 'remark', 
                    width: 120,
                    ellipsis: true,
                    render: v => v 
                        ? <Tooltip title={v}><Text style={{ fontSize: 12, color: '#595959' }}>{v}</Text></Tooltip>
                        : <Text type="secondary" style={{ fontSize: 12 }}>—</Text>
                },
                {
                    title: '操作',
                    key: 'op',
                    width: 140,
                    align: 'center',
                    fixed: 'right',
                    render: (_, r) => (
                        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center' }}>
                            <a style={{ fontSize: 13, color: '#1890ff', cursor: 'pointer' }} onClick={() => showDetail(r)}>详情</a>
                            <Divider type="vertical" style={{ margin: '0 8px', borderColor: '#d9d9d9' }} />
                            <a style={{ fontSize: 13, color: '#1890ff', cursor: 'pointer' }} onClick={() => handleRemark(r)}>
                                备注
                            </a>
                        </div>
                    )
                }
            ];

            // 获取详情抽屉的时间线数据
            const detailTimeline = selectedRecord ? getCaseTimeline(selectedRecord.case_id) : [];
            const caseStatus = selectedRecord ? getCaseFinalStatus(selectedRecord.case_id) : {};

            return (
                <div style={{ background: '#fff', padding: '24px', borderRadius: '8px' }}>
                    {/* 一、筛选区（审计增强） */}
                    <div style={{ marginBottom: 20, padding: '16px 20px', background: '#fafafa', borderRadius: '8px' }}>
                        <Row gutter={12} align="middle">
                            <Col>
                                <Input 
                                    placeholder="商户ID/名称" 
                                    style={{ width: 150 }}
                                    prefix={<SearchOutlined style={{ color: '#bfbfbf' }} />}
                                    value={filters.merchant}
                                    onChange={e => setFilters(f => ({ ...f, merchant: e.target.value }))}
                                    allowClear
                                />
                            </Col>
                            <Col>
                                <RangePicker 
                                    style={{ width: 260 }}
                                    placeholder={['开始时间', '结束时间']}
                                    onChange={v => setFilters(f => ({ ...f, dateRange: v }))}
                                />
                            </Col>
                            <Col>
                                <Select 
                                    mode="multiple"
                                    value={filters.actionTypes} 
                                    style={{ width: 200 }}
                                    placeholder="动作类型"
                                    maxTagCount={1}
                                    onChange={v => setFilters(f => ({ ...f, actionTypes: v }))}
                                >
                                    <Option value="SYSTEM_AUTO_FUSE">系统熔断</Option>
                                    <Option value="ADMIN_MANUAL_FUSE">人工熔断</Option>
                                    <Option value="ADMIN_UNFREEZE">执行解封</Option>
                                </Select>
                            </Col>
                            <Col>
                                <Select 
                                    value={filters.actorType} 
                                    style={{ width: 110 }}
                                    onChange={v => setFilters(f => ({ ...f, actorType: v }))}
                                >
                                    <Option value="ALL">全部主体</Option>
                                    <Option value="SYSTEM">SYSTEM</Option>
                                    <Option value="ADMIN">ADMIN</Option>
                                </Select>
                            </Col>
                            <Col>
                                <Select 
                                    value={filters.hasRemark} 
                                    style={{ width: 110 }}
                                    onChange={v => setFilters(f => ({ ...f, hasRemark: v }))}
                                >
                                    <Option value="ALL">全部</Option>
                                    <Option value="YES">有备注</Option>
                                    <Option value="NO">无备注</Option>
                                </Select>
                            </Col>
                            <Col>
                                <Button type="primary" icon={<SearchOutlined />}>查询</Button>
                            </Col>
                            <Col>
                                <Button icon={<ReloadOutlined />} onClick={resetFilters}>重置</Button>
                            </Col>
                            <Col flex="auto" />
                            <Col>
                                <Button icon={<DownloadOutlined />}>导出当前筛选范围</Button>
                            </Col>
                        </Row>
                    </div>

                    {/* 二、审计事件列表 */}
                    <Table
                        columns={columns}
                        dataSource={filteredCases}
                        rowKey="id"
                        size="middle"
                        pagination={{ pageSize: 15, showTotal: t => `共 ${t} 条审计记录` }}
                        scroll={{ x: 1150 }}
                    />

                    {/* 三、事件详情抽屉（Timeline 形式） */}
                    <Drawer
                        title={<Space><FileSearchOutlined />审计事件详情</Space>}
                        placement="right"
                        width={560}
                        onClose={() => setDrawerVisible(false)}
                        open={drawerVisible}
                    >
                        {selectedRecord && (
                            <Space direction="vertical" size={20} style={{ width: '100%' }}>
                                {/* A) 事件摘要 */}
                                <Card size="small" style={{ background: '#f6f8fa' }}>
                                    <Row gutter={16}>
                                        <Col span={12}>
                                            <Text type="secondary" style={{ fontSize: 12 }}>Case ID</Text>
                                            <div><Text strong copyable style={{ fontSize: 14 }}>{selectedRecord.case_id}</Text></div>
                                        </Col>
                                        <Col span={12}>
                                            <Text type="secondary" style={{ fontSize: 12 }}>商户</Text>
                                            <div>
                                                <Text strong style={{ fontSize: 14 }}>{selectedRecord.merchant_name}</Text>
                                                <Text type="secondary" style={{ fontSize: 12, marginLeft: 6 }}>({selectedRecord.merchant_id})</Text>
                                            </div>
                                        </Col>
                                    </Row>
                                    <Divider style={{ margin: '12px 0' }} />
                                    <Row gutter={12}>
                                        <Col span={6}>
                                            <Text type="secondary" style={{ fontSize: 12 }}>当前状态</Text>
                                            <div>
                                                <Tag color={caseStatus.status === '已解封' ? 'success' : 'error'} style={{ fontSize: 13 }}>
                                                    {caseStatus.status}
                                                </Tag>
                                            </div>
                                        </Col>
                                        <Col span={6}>
                                            <Text type="secondary" style={{ fontSize: 12 }}>风险等级</Text>
                                            <div>
                                                <Tag color={RISK_LEVEL_LABEL[caseStatus.riskLevel]?.color || 'default'} style={{ fontSize: 13 }}>
                                                    {RISK_LEVEL_LABEL[caseStatus.riskLevel]?.text || '—'}
                                                    {caseStatus.riskLevel === 'WARN' && <span style={{ fontSize: 11 }}>（观察中）</span>}
                                                </Tag>
                                            </div>
                                        </Col>
                                        <Col span={6}>
                                            <Text type="secondary" style={{ fontSize: 12 }}>出款状态</Text>
                                            <div>
                                                <Tag color={caseStatus.stopWithdraw ? 'error' : 'success'} style={{ fontSize: 12 }}>
                                                    {caseStatus.stopWithdraw ? '🔴 暂停自动出款' : '🟢 出款正常'}
                                                </Tag>
                                            </div>
                                        </Col>
                                        <Col span={6}>
                                            <Text type="secondary" style={{ fontSize: 12 }}>事件数量</Text>
                                            <div><Text strong style={{ fontSize: 14 }}>{detailTimeline.length} 条</Text></div>
                                        </Col>
                                    </Row>
                                </Card>

                                {/* B) 事件时间线 */}
                                <div>
                                    <Text strong style={{ fontSize: 15, marginBottom: 12, display: 'block' }}>
                                        <HistoryOutlined style={{ marginRight: 8 }} />事件时间线
                                    </Text>
                                    <div style={{ paddingLeft: 8 }}>
                                        {detailTimeline.map((item, idx) => {
                                            const cfg = ACTION_TYPE_CONFIG[item.action_type] || {};
                                            const IconComp = cfg.icon;
                                            const isLast = idx === detailTimeline.length - 1;
                                            return (
                                                <div key={item.id} style={{ display: 'flex', marginBottom: isLast ? 0 : 20, position: 'relative', paddingLeft: 28 }}>
                                                    {/* 时间线节点 */}
                                                    <div style={{ 
                                                        position: 'absolute', left: 0, top: 4, 
                                                        width: 14, height: 14, borderRadius: '50%', 
                                                        background: cfg.color === 'error' ? '#ff4d4f' : cfg.color === 'success' ? '#52c41a' : '#faad14',
                                                        display: 'flex', alignItems: 'center', justifyContent: 'center'
                                                    }}>
                                                        {IconComp && <IconComp style={{ fontSize: 10, color: '#fff' }} />}
                                                    </div>
                                                    {/* 连接线 */}
                                                    {!isLast && <div style={{ position: 'absolute', left: 6, top: 20, width: 2, height: 'calc(100% + 8px)', background: '#e8e8e8' }} />}
                                                    {/* 内容 */}
                                                    <div style={{ flex: 1, background: '#fafafa', padding: '10px 14px', borderRadius: 6 }}>
                                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                                                            <Space size={8}>
                                                                <Tag color={cfg.color} style={{ fontSize: 12, margin: 0 }}>{cfg.label}</Tag>
                                                                <Text style={{ fontSize: 12, fontFamily: 'monospace', color: '#8c8c8c' }}>{item.trigger_time}</Text>
                                                            </Space>
                                                            <Tag color={item.result === 'SUCCESS' ? 'success' : 'error'} style={{ fontSize: 11, margin: 0 }}>
                                                                {item.result === 'SUCCESS' ? '成功' : '失败'}
                                                            </Tag>
                                                        </div>
                                                        <div style={{ marginBottom: 6 }}>
                                                            <Text style={{ fontSize: 13 }}>
                                                                执行主体: <Text strong>{item.actor_name}</Text>
                                                                {item.actor_role && <Text type="secondary"> ({item.actor_role})</Text>}
                                                            </Text>
                                                        </div>
                                                        {/* 解封事件特殊展示 */}
                                                        {item.action_type === 'ADMIN_UNFREEZE' ? (
                                                            <div style={{ fontSize: 12 }}>
                                                                <div style={{ marginBottom: 4, color: '#666' }}>
                                                                    <span>分数: </span>
                                                                    <Text strong type="danger">{item.snapshot?.score_before}</Text>
                                                                    <span style={{ margin: '0 6px', color: '#999' }}>→</span>
                                                                    <Text strong style={{ color: '#fa8c16' }}>{item.snapshot?.score_after}</Text>
                                                                    <Tag color="warning" style={{ fontSize: 11, margin: '0 0 0 8px', padding: '0 6px' }}>
                                                                        {RISK_LEVEL_LABEL[item.snapshot?.risk_level_after]?.text || '警告'}
                                                                    </Tag>
                                                                </div>
                                                                <div style={{ marginBottom: 4 }}>
                                                                    <Tag color="success" style={{ fontSize: 11, margin: 0, padding: '0 6px' }}>🟢 出款正常（已告警）</Tag>
                                                                </div>
                                                                <div style={{ padding: '6px 10px', background: '#fffbe6', border: '1px solid #ffe58f', borderRadius: 4, marginTop: 6 }}>
                                                                    <Text style={{ fontSize: 12, color: '#d48806' }}>
                                                                        <AlertOutlined style={{ marginRight: 6 }} />
                                                                        动作影响：恢复出款，进入警告观察期
                                                                    </Text>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div style={{ fontSize: 12, color: '#666' }}>
                                                                <span>分数: <Text strong type={item.snapshot?.score >= 100 ? 'danger' : undefined}>{item.snapshot?.score}</Text></span>
                                                                <Divider type="vertical" />
                                                                <Tag color={item.snapshot?.stop_withdraw ? 'error' : 'success'} style={{ fontSize: 11, margin: 0 }}>{item.snapshot?.stop_withdraw ? '🔴 暂停自动出款' : '🟢 出款正常'}</Tag>
                                                            </div>
                                                        )}
                                                        {item.snapshot?.top2_rules?.length > 0 && (
                                                            <div style={{ fontSize: 12, color: '#8c8c8c', marginTop: 4 }}>
                                                                Top2: {item.snapshot.top2_rules.map(t => `${t.name} ${t.strength}`).join(' / ')}
                                                            </div>
                                                        )}
                                                        {item.notes && (
                                                            <div style={{ fontSize: 12, color: '#666', marginTop: 6, paddingTop: 6, borderTop: '1px dashed #e8e8e8' }}>
                                                                备注: {item.notes}
                                                            </div>
                                                        )}
                                                        {item.evidence_count > 0 && (
                                                            <div style={{ fontSize: 12, marginTop: 4 }}>
                                                                <LinkOutlined /> 证据: {item.evidence_count} 个
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* C) 证据区 */}
                                {selectedRecord.attachments && selectedRecord.attachments.length > 0 && (
                                    <div>
                                        <Text strong style={{ fontSize: 15 }}>
                                            <LinkOutlined style={{ marginRight: 8 }} />证据附件 ({selectedRecord.attachments.length})
                                        </Text>
                                        <div style={{ marginTop: 10 }}>
                                            {selectedRecord.attachments.map((f, i) => (
                                                <Tag 
                                                    key={i} 
                                                    icon={<LinkOutlined />} 
                                                    style={{ marginBottom: 6, marginRight: 6, cursor: 'pointer', fontSize: 12, padding: '4px 10px' }} 
                                                    onClick={() => message.info(`打开附件: ${f}`)}
                                                >
                                                    {f}
                                                </Tag>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </Space>
                        )}
                    </Drawer>

                    {/* 备注弹窗 */}
                    <Modal
                        title="添加备注"
                        open={remarkModalVisible}
                        onOk={confirmRemark}
                        onCancel={() => { setRemarkModalVisible(false); setRemarkTarget(null); setRemarkInput(''); }}
                        okText="保存"
                        cancelText="取消"
                        width={450}
                    >
                        {remarkTarget && (
                            <div>
                                <div style={{ marginBottom: 12, padding: '8px 12px', background: '#fafafa', borderRadius: 6 }}>
                                    <Text type="secondary" style={{ fontSize: 12 }}>
                                        事件：{ACTION_TYPE_CONFIG[remarkTarget.action_type]?.label} - {remarkTarget.merchant_name}
                                    </Text>
                                </div>
                                <Input.TextArea 
                                    placeholder="请输入备注内容..." 
                                    rows={3}
                                    value={remarkInput}
                                    onChange={e => setRemarkInput(e.target.value)}
                                    maxLength={200}
                                    showCount
                                />
                            </div>
                        )}
                    </Modal>
                </div>
            );
        };

        // ========== 原 AuditLogsModule 保留兼容 ==========
        const AuditLogsModule = () => <AuditCenterModule />;

        // ========== 9.3 风险看板模块 (深度美化版) ==========
        const RiskDashboardModule = () => {
            return (
                <div style={{ padding: '8px 0' }}>
                    <Row gutter={[24, 24]} style={{ marginBottom: 24 }}>
                        <Col span={8}>
                            <Card 
                                className="kpi-card" 
                                bodyStyle={{ padding: 24, position: 'relative', overflow: 'hidden' }}
                                style={{ background: 'linear-gradient(135deg, #fff 0%, #fff5f5 100%)', borderLeft: '4px solid #ff4d4f' }}
                            >
                                <div className="kpi-icon">{StopOutlined && <StopOutlined style={{ color: '#ff4d4f' }} />}</div>
                                <Statistic 
                                    title={<Text style={{ color: '#8c8c8c', fontSize: 13 }}>近30天系统自动熔断</Text>}
                                    value={MOCK_DASHBOARD_STATS.summary.total_fuses} 
                                    suffix={<Text style={{ fontSize: 16, color: '#8c8c8c' }}>次</Text>}
                                    valueStyle={{ color: '#cf1322', fontWeight: 700, fontSize: 36 }} 
                                />
                                <div style={{ marginTop: 12, fontSize: 12, color: '#52c41a', display: 'flex', alignItems: 'center', gap: 4 }}>
                                    {ArrowUpOutlined && <ArrowUpOutlined />} 同比上月增长 12%
                                </div>
                            </Card>
                        </Col>
                        <Col span={8}>
                            <Card className="kpi-card" bodyStyle={{ padding: 20 }}>
                                <div className="kpi-icon">{BarChartOutlined && <BarChartOutlined style={{ color: '#1890ff' }} />}</div>
                                <Statistic 
                                    title={<Text style={{ color: '#8c8c8c', fontSize: 13 }}>全量商户风险均分</Text>} 
                                    value={MOCK_DASHBOARD_STATS.summary.avg_score} 
                                    precision={1}
                                    valueStyle={{ color: '#262626', fontWeight: 700 }} 
                                />
                                <div style={{ marginTop: 8, fontSize: 12, color: '#bfbfbf' }}>
                                    处于“安全”水位 (阈值 40)
                                </div>
                            </Card>
                        </Col>
                        <Col span={8}>
                            <Card className="kpi-card" bodyStyle={{ padding: 20 }}>
                                <div className="kpi-icon">{InfoCircleOutlined && <InfoCircleOutlined style={{ color: '#faad14' }} />}</div>
                                <Statistic 
                                    title={<Text style={{ color: '#8c8c8c', fontSize: 13 }}>规则误报率 (人工介入)</Text>} 
                                    value={MOCK_DASHBOARD_STATS.summary.false_positive_rate} 
                                    valueStyle={{ color: '#faad14', fontWeight: 700 }} 
                                />
                                <div style={{ marginTop: 8, fontSize: 12, color: '#8c8c8c' }}>
                                    已根据反馈优化 3 条规则
                                </div>
                            </Card>
                        </Col>
                    </Row>

                    <Row gutter={24}>
                        <Col span={16}>
                            <Card title={<Space>{LineChartOutlined && <LineChartOutlined />} 风险态势感知 (近7日)</Space>} bordered={false} style={{ borderRadius: 12, boxShadow: '0 4px 12px rgba(0,0,0,0.03)' }}>
                                <div className="trend-chart-container">
                                    {MOCK_DASHBOARD_STATS.trends.map((item, i) => (
                                        <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, flex: 1 }}>
                                            <Tooltip title={`分值: ${item.score}`}>
                                                <div 
                                                    className="trend-bar" 
                                                    data-value={item.score}
                                                    style={{ 
                                                        height: (item.score / 150) * 160, 
                                                        background: item.score >= 100 ? 'linear-gradient(180deg, #ff4d4f 0%, #ff7875 100%)' : 'linear-gradient(180deg, #1890ff 0%, #69c0ff 100%)'
                                                    }} 
                                                />
                                            </Tooltip>
                                            <Text type="secondary" style={{ fontSize: 11 }}>{item.date}</Text>
                                        </div>
                                    ))}
                                    {/* 辅助线 */}
                                    <div style={{ position: 'absolute', left: 0, right: 0, top: 160 - (100 / 150) * 160 + 24, borderTop: '1px dashed #ffccc7', zIndex: 0 }}>
                                        <span style={{ position: 'absolute', right: 8, top: -18, fontSize: 10, color: '#ff4d4f', opacity: 0.6 }}>熔断阈值线</span>
                                    </div>
                                </div>
                            </Card>
                        </Col>
                        <Col span={8}>
                            <Card title={<Space>{BarChartOutlined && <BarChartOutlined />} 熔断频次排行</Space>} bordered={false} style={{ borderRadius: 12, boxShadow: '0 4px 12px rgba(0,0,0,0.03)' }}>
                                <Table 
                                    size="small"
                                    pagination={false}
                                    dataSource={MOCK_DASHBOARD_STATS.ranking}
                                    columns={[
                                        { title: '商户名', dataIndex: 'name', render: v => <Text strong>{v}</Text> },
                                        { title: '频次', dataIndex: 'count', align: 'right', render: v => <Text type="danger">{v}次</Text> },
                                        { title: '异常占比', dataIndex: 'rate', align: 'right', render: v => <Text type="secondary">{v}</Text> }
                                    ]}
                                />
                                <div style={{ marginTop: 16, textAlign: 'center' }}>
                                    <Button size="small" type="link">查看全量商户排行 →</Button>
                                </div>
                            </Card>
                        </Col>
                    </Row>
                </div>
            );
        };

        // 风险等级徽章（带图标）
        const RiskLevelBadge = ({ level, showIcon = true }) => {
            if (!level) return null;
            const config = DEFAULT_THRESHOLDS[level.toUpperCase()] || DEFAULT_THRESHOLDS.NORMAL;
            const IconComponent = config.icon;
            return (
                <span className={`level-badge level-${level.toLowerCase()}`}>
                    {showIcon && IconComponent && <IconComponent style={{ marginRight: 4 }} />}
                    {config.label}
                </span>
            );
        };
        
        // 风险分数显示组件（带仪表盘效果）- 显示实际分数
        const RiskScoreGauge = ({ score, level }) => {
            if (!level) return <Text strong>{score}</Text>;
            const config = DEFAULT_THRESHOLDS[level.toUpperCase()] || DEFAULT_THRESHOLDS.NORMAL;
            const displayScore = score; // 直接显示实际分数
            const percent = Math.min((score / 100) * 100, 100);
            const strokeColor = score >= 80 ? '#cf1322' : score >= 60 ? '#d46b08' : score >= 40 ? '#d48806' : '#1890ff';
            const riskStatus = getRiskStatus(score);
            
            return (
                <Tooltip title={score >= 100 ? `分数 ≥100，熔断状态` : null}>
                    <div className="score-gauge">
                        <div className="score-gauge-inner">
                            <Progress 
                                type="circle" 
                                percent={percent} 
                                size={48}
                                strokeWidth={6}
                                strokeColor={strokeColor}
                                trailColor="#f0f0f0"
                                format={() => (
                                    <span style={{ fontSize: score > 100 ? 12 : 14, fontWeight: 600, color: strokeColor }}>
                                        {displayScore}
                                    </span>
                                )}
                            />
                        </div>
                        <div className="score-gauge-label">
                            <Tag color={riskStatus.color} style={{ margin: 0, fontSize: 11 }}>{riskStatus.label}</Tag>
                        </div>
                    </div>
                </Tooltip>
            );
        };

        // 规则原因标签
        const RuleReasonTag = ({ reason }) => (
            <Tooltip title={`强度: ${reason.strength_text}`}>
                <Tag color="volcano" style={{ marginBottom: 4 }}>
                    {reason.rule_name} <Text strong>+{reason.add_score}</Text>
                </Tag>
            </Tooltip>
        );

        // ========== 主页面 ==========

        // === 顶部概览统计卡片组件 ===
        const OverviewHeader = ({ data }) => {
            const stats = useMemo(() => {
                const counts = { fuse: 0, limit: 0, warn: 0, normal: 0 };
                data.forEach(m => {
                    const level = m.risk_level?.toLowerCase();
                    if (counts[level] !== undefined) counts[level]++;
                });
                return counts;
            }, [data]);
            
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleString('zh-CN'));
            
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date().toLocaleString('zh-CN'));
                }, 1000);
                return () => clearInterval(timer);
            }, []);
            
            return (
                <div className="overview-header">
                    <Row align="middle" justify="space-between" style={{ marginBottom: 24 }}>
                        <Col>
                            <div className="overview-title">商户风控监控中心</div>
                        </Col>
                        <Col>
                            <Space size={16}>
                                <div className="live-indicator">
                                    <span className="live-dot"></span>
                                    实时监控中
                                </div>
                                <Text style={{ color: 'rgba(255,255,255,0.6)', fontSize: 13 }}>
                                    {currentTime}
                                </Text>
                            </Space>
                        </Col>
                    </Row>
                    <div className="stat-cards">
                        <div className="stat-card fuse">
                            <div className="stat-card-icon">{StopOutlined && <StopOutlined />}</div>
                            <div className="stat-card-value">{stats.fuse}</div>
                            <div className="stat-card-label">熔断中</div>
                        </div>
                        <div className="stat-card limit">
                            <div className="stat-card-icon">{ClockCircleOutlined && <ClockCircleOutlined />}</div>
                            <div className="stat-card-value">{stats.limit}</div>
                            <div className="stat-card-label">延迟观察中</div>
                        </div>
                        <div className="stat-card warn">
                            <div className="stat-card-icon">{WarningOutlined && <WarningOutlined />}</div>
                            <div className="stat-card-value">{stats.warn}</div>
                            <div className="stat-card-label">已告警</div>
                        </div>
                        <div className="stat-card normal">
                            <div className="stat-card-icon">{CheckCircleOutlined && <CheckCircleOutlined />}</div>
                            <div className="stat-card-value">{stats.normal}</div>
                            <div className="stat-card-label">正常</div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(MOCK_MERCHANTS);
            const [filterOnlyAction, setFilterOnlyAction] = useState(false);
            const [autoRefresh, setAutoRefresh] = useState('Off');
            
            // 阈值配置状态
            const [riskThresholds, setRiskThresholds] = useState(DEFAULT_THRESHOLDS);
            const [ruleConfigs, setRuleConfigs] = useState(DEFAULT_RULE_CONFIGS);
            const [thresholdModalVisible, setThresholdModalVisible] = useState(false);
            const [configActiveTab, setConfigActiveTab] = useState('threshold');
            const [thresholdForm] = Form.useForm();
            const [ruleForm] = Form.useForm();
            
            // 抽屉状态
            const [drawerVisible, setDrawerVisible] = useState(false);
            const [selectedMerchant, setSelectedMerchant] = useState(null);
            
            // 弹窗状态
            const [fuseModalVisible, setFuseModalVisible] = useState(false);
            const [unfreezeModalVisible, setUnfreezeModalVisible] = useState(false);
            const [targetId, setTargetId] = useState(null);

            const [form] = Form.useForm();
            const [fuseForm] = Form.useForm();
            const [unfreezeForm] = Form.useForm();
            
            // 打开阈值配置
            const openThresholdConfig = () => {
                thresholdForm.setFieldsValue({
                    normalMax: riskThresholds.NORMAL.max,
                    warnMin: riskThresholds.WARN.min,
                    warnMax: riskThresholds.WARN.max,
                    limitMin: riskThresholds.LIMIT.min,
                    limitMax: riskThresholds.LIMIT.max,
                    fuseMin: riskThresholds.FUSE.min
                });
                // 设置规则表单初始值
                const ruleFormValues = {};
                Object.keys(ruleConfigs).forEach(key => {
                    const rule = ruleConfigs[key];
                    ruleFormValues[`${key}_enabled`] = rule.enabled;
                    ruleFormValues[`${key}_weight`] = rule.weight;
                    if (rule.scoreMap) {
                        Object.keys(rule.scoreMap).forEach(scoreKey => {
                            ruleFormValues[`${key}_score_${scoreKey.replace(/[^a-zA-Z0-9]/g, '_')}`] = rule.scoreMap[scoreKey];
                        });
                    }
                });
                ruleForm.setFieldsValue(ruleFormValues);
                setThresholdModalVisible(true);
            };
            
            // 保存配置
            const saveThresholdConfig = () => {
                if (configActiveTab === 'threshold') {
                    thresholdForm.validateFields().then(values => {
                        setRiskThresholds({
                            NORMAL: { ...riskThresholds.NORMAL, max: values.normalMax },
                            WARN: { ...riskThresholds.WARN, min: values.warnMin, max: values.warnMax },
                            LIMIT: { ...riskThresholds.LIMIT, min: values.limitMin, max: values.limitMax },
                            FUSE: { ...riskThresholds.FUSE, min: values.fuseMin }
                        });
                        setThresholdModalVisible(false);
                        message.success('阈值配置已更新');
                    });
                } else {
                    ruleForm.validateFields().then(values => {
                        const newRuleConfigs = { ...ruleConfigs };
                        Object.keys(newRuleConfigs).forEach(key => {
                            newRuleConfigs[key] = {
                                ...newRuleConfigs[key],
                                enabled: values[`${key}_enabled`],
                                weight: values[`${key}_weight`]
                            };
                            // 更新分数
                            if (newRuleConfigs[key].scoreMap) {
                                const newScoreMap = {};
                                Object.keys(newRuleConfigs[key].scoreMap).forEach(scoreKey => {
                                    const formKey = `${key}_score_${scoreKey.replace(/[^a-zA-Z0-9]/g, '_')}`;
                                    newScoreMap[scoreKey] = values[formKey] || newRuleConfigs[key].scoreMap[scoreKey];
                                });
                                newRuleConfigs[key].scoreMap = newScoreMap;
                            }
                        });
                        setRuleConfigs(newRuleConfigs);
                        setThresholdModalVisible(false);
                        message.success('规则配置已更新');
                    });
                }
            };

            // 搜索
            const handleSearch = () => {
                setLoading(true);
                setTimeout(() => {
                    let filtered = [...MOCK_MERCHANTS];
                    if (filterOnlyAction) {
                        filtered = filtered.filter(m => ['Limit', 'Fuse'].includes(m.risk_level));
                    }
                    setData(filtered);
                    setLoading(false);
                }, 300);
            };

            // 显示详情
            const showDetail = (id) => {
                setSelectedMerchant(getMockDetail(id));
                setDrawerVisible(true);
            };

            // 熔断操作
            const handleFuseClick = (id) => {
                setTargetId(id);
                fuseForm.resetFields();
                setFuseModalVisible(true);
            };

            const submitFuse = async () => {
                try {
                    const values = await fuseForm.validateFields();
                    setLoading(true);
                    // Mock: POST /api/risk/merchant/{id}/fuse
                    setTimeout(() => {
                        message.success(`商户 ${targetId} 已熔断，暂停自动出款`);
                        setFuseModalVisible(false);
                        setDrawerVisible(false);
                        handleSearch();
                        setLoading(false);
                    }, 500);
                } catch (e) {}
            };

            // 解封操作
            const handleUnfreezeClick = (id) => {
                setTargetId(id);
                unfreezeForm.resetFields();
                setUnfreezeModalVisible(true);
            };

            const submitUnfreeze = async () => {
                try {
                    const values = await unfreezeForm.validateFields();
                    setLoading(true);
                    // Mock: POST /api/risk/merchant/{id}/unfreeze
                    setTimeout(() => {
                        const strategyText = values.strategy === 'recovering' ? '延迟观察期' : '直接恢复正常';
                        message.success(`已恢复出款，策略：${strategyText}`);
                        setUnfreezeModalVisible(false);
                        setDrawerVisible(false);
                        handleSearch();
                        setLoading(false);
                    }, 500);
                } catch (e) {}
            };

            // 排序：Fuse > Limit > Warn > Normal，同级按分数降序
            const sortedData = useMemo(() => {
                const levelOrder = { Fuse: 4, Limit: 3, Warn: 2, Normal: 1 };
                return [...data].sort((a, b) => {
                    const diff = levelOrder[b.risk_level] - levelOrder[a.risk_level];
                    return diff !== 0 ? diff : b.risk_score - a.risk_score;
                });
            }, [data]);

            // 表格列定义
            const columns = [
                {
                    title: '商户',
                    key: 'merchant',
                    width: 160,
                    render: (_, r) => (
                        <Space direction="vertical" size={2}>
                            <Text strong style={{ fontSize: 15 }}>{r.merchant_name}</Text>
                            <Space size={4}>
                                <Text type="secondary" style={{ fontSize: 13, fontFamily: 'monospace' }}>{r.merchant_id}</Text>
                                <CopyOutlined 
                                    style={{ fontSize: 10, color: '#bfbfbf', cursor: 'pointer' }} 
                                    onClick={() => { navigator.clipboard.writeText(r.merchant_id); message.success('已复制'); }} 
                                />
                            </Space>
                        </Space>
                    )
                },
                {
                    title: '风险分',
                    key: 'score',
                    width: 100,
                    sorter: (a, b) => a.risk_score - b.risk_score,
                    render: (_, r) => <RiskScoreGauge score={r.risk_score} level={r.risk_level} />
                },
                {
                    title: '最后触发',
                    dataIndex: 'last_trigger_at',
                    key: 'time',
                    width: 150,
                    render: (v) => {
                        const [date, time] = v.split(' ');
                        return (
                            <Space direction="vertical" size={0}>
                                <Text className="timestamp" style={{ fontSize: 13, color: '#595959' }}>{date}</Text>
                                <Text className="timestamp" style={{ fontSize: 12, color: '#bfbfbf' }}>{time}</Text>
                            </Space>
                        );
                    }
                },
                {
                    title: '处置动作',
                    key: 'actions',
                    width: 160,
                    render: (_, r) => {
                        const riskStatus = getRiskStatus(r.risk_score);
                        const releaseCondition = RELEASE_CONDITIONS[riskStatus.key];
                        
                        // 根据风险态显示不同的处置动作
                        if (riskStatus.key === 'FUSE') {
                            // 熔断状态
                            return (
                                <Tooltip title={<div style={{ fontSize: 12 }}><div>解除条件：{releaseCondition}</div></div>}>
                                    <Space direction="vertical" size={2} style={{ cursor: 'help' }}>
                                        <Tag icon={<StopOutlined />} color="error" style={{ margin: 0, padding: '2px 10px', borderRadius: 12 }}>暂停自动出款</Tag>
                                        <Text type="secondary" style={{ fontSize: 11 }}>需人工解除</Text>
                                    </Space>
                                </Tooltip>
                            );
                        }
                        
                        if (riskStatus.key === 'LIMIT') {
                            // 延迟处理
                            return (
                                <Tooltip title={<div style={{ fontSize: 12 }}>进入观察期，出款将延迟处理（约30分钟）<br/>解除条件：{releaseCondition}</div>}>
                                    <Tag icon={<ClockCircleOutlined />} color="orange" style={{ margin: 0, padding: '2px 10px', borderRadius: 12, cursor: 'help' }}>出款延迟中</Tag>
                                </Tooltip>
                            );
                        }
                        
                        if (riskStatus.key === 'WARN') {
                            // 已告警：出款正常 + 已告警 tag
                            return (
                                <Space size={4}>
                                    <Tag icon={<CheckCircleOutlined />} color="success" style={{ margin: 0, padding: '2px 10px', borderRadius: 12 }}>出款正常</Tag>
                                    <Tag color="gold" style={{ margin: 0, padding: '2px 6px', borderRadius: 12, fontSize: 11 }}>已告警</Tag>
                                </Space>
                            );
                        }
                        
                        // 正常
                        return (
                            <Tag icon={<CheckCircleOutlined />} color="success" style={{ margin: 0, padding: '2px 10px', borderRadius: 12 }}>出款正常</Tag>
                        );
                    }
                },
                {
                    title: '操作',
                    key: 'op',
                    width: 180,
                    fixed: 'right',
                    render: (_, r) => {
                        // 二次确认弹窗
                        const showConfirm = (title, okText, okDanger, onOk) => {
                            Modal.confirm({
                                title,
                                icon: <ExclamationCircleOutlined />,
                                content: (
                                    <Form layout="vertical" style={{ marginTop: 16 }}>
                                        <Form.Item label="操作原因" required>
                                            <Select placeholder="请选择原因" style={{ width: '100%' }}>
                                                <Option value="false_positive">误报</Option>
                                                <Option value="confirmed_risk">确认风险</Option>
                                                <Option value="manual_dispose">人工处置</Option>
                                                <Option value="policy_adjust">策略调整</Option>
                                                <Option value="other">其他</Option>
                                            </Select>
                                        </Form.Item>
                                        <Form.Item label="备注（选填）">
                                            <Input.TextArea rows={2} placeholder="补充说明" />
                                        </Form.Item>
                                    </Form>
                                ),
                                okText,
                                okButtonProps: okDanger ? { danger: true } : {},
                                cancelText: '取消',
                                onOk
                            });
                        };
                        
                        return (
                            <Space size={4}>
                                <Button 
                                    type="primary" 
                                    size="small" 
                                    icon={<FileSearchOutlined />}
                                    onClick={() => showDetail(r.merchant_id)}
                                >
                                    详情
                                </Button>
                                {/* 暂停出款按钮 - 仅正常和已告警状态显示 */}
                                {r.risk_level !== 'Fuse' && r.risk_level !== 'Limit' && r.permissions.can_fuse && (
                                    <Button 
                                        size="small" 
                                        danger
                                        icon={<StopOutlined />}
                                        onClick={() => showConfirm('确认暂停自动出款', '确认暂停', true, () => handleFuseClick(r.merchant_id))}
                                    >
                                        暂停出款
                                    </Button>
                                )}
                                {/* 解除延迟按钮 - 仅延迟观察状态显示 */}
                                {r.risk_level === 'Limit' && r.permissions.can_unfreeze && (
                                    <Button 
                                        size="small"
                                        icon={<ClockCircleOutlined />}
                                        style={{ color: '#1890ff', borderColor: '#1890ff' }}
                                        onClick={() => showConfirm('确认解除延迟观察', '确认解除', false, () => { message.success('已解除延迟观察'); })}
                                    >
                                        解除延迟
                                    </Button>
                                )}
                                {/* 解封按钮 - 仅熔断状态显示 */}
                                {r.risk_level === 'Fuse' && r.permissions.can_unfreeze && (
                                    <Tooltip title="解封后将进入观察状态，出款将逐步恢复">
                                        <Button 
                                            size="small"
                                            icon={<UnlockOutlined />}
                                            style={{ color: '#52c41a', borderColor: '#52c41a' }}
                                            onClick={() => handleUnfreezeClick(r.merchant_id)}
                                        >
                                            解封
                                        </Button>
                                    </Tooltip>
                                )}
                            </Space>
                        );
                    }
                }
            ];

            const [activeTab, setActiveTab] = useState('monitor');

            // 列表主视图组件
            const MonitoringModule = () => (
                <>
                    <Card className="filter-bar" bodyStyle={{ padding: 0 }}>
                        <Form form={form} layout="inline" style={{ flexWrap: 'wrap', gap: 12, alignItems: 'center' }}>
                            <Form.Item name="merchant" label={<Text type="secondary" style={{ fontSize: 14 }}>商户</Text>}>
                                <Select showSearch placeholder="ID/名称" style={{ width: 160 }} allowClear>
                                    {MOCK_MERCHANTS.map(m => <Option key={m.merchant_id} value={m.merchant_id}>{m.merchant_name}</Option>)}
                                </Select>
                            </Form.Item>
                            <Form.Item name="level" label={<Text type="secondary" style={{ fontSize: 14 }}>风险等级</Text>}>
                                <Select placeholder="全部" style={{ width: 110 }} allowClear>
                                    <Option value="Normal">正常</Option>
                                    <Option value="Warn">已告警</Option>
                                    <Option value="Limit">延迟观察</Option>
                                    <Option value="Fuse">熔断</Option>
                                </Select>
                            </Form.Item>
                            <Form.Item label={<Text type="secondary" style={{ fontSize: 14 }}>分数范围</Text>}>
                                <Space>
                                    <Form.Item name="min_score" noStyle><Input style={{ width: 56, textAlign: 'center' }} placeholder="0" /></Form.Item>
                                    <Text type="secondary">~</Text>
                                    <Form.Item name="max_score" noStyle><Input style={{ width: 56, textAlign: 'center' }} placeholder="100" /></Form.Item>
                                </Space>
                            </Form.Item>
                            <Form.Item name="time" label={<Text type="secondary" style={{ fontSize: 14 }}>触发时间</Text>}>
                                <Select defaultValue="24h" style={{ width: 85 }}>
                                    <Option value="1h">近 1h</Option>
                                    <Option value="24h">近 24h</Option>
                                    <Option value="7d">近 7d</Option>
                                </Select>
                            </Form.Item>
                            <Form.Item>
                                <Space size={8}>
                                    <Button type="primary" icon={<SearchOutlined />} onClick={handleSearch}>查询</Button>
                                    <Button icon={<ReloadOutlined />} onClick={() => { form.resetFields(); handleSearch(); }}>重置</Button>
                                </Space>
                            </Form.Item>
                            <div style={{ flex: 1 }} />
                            <Form.Item style={{ marginRight: 0 }}>
                                <Space size={20}>
                                    <Space size={8}>
                                        <Text type="secondary" style={{ fontSize: 14 }}>只看需处理</Text>
                                        <Switch 
                                            size="small" 
                                            checked={filterOnlyAction} 
                                            onChange={v => { setFilterOnlyAction(v); }}
                                            style={{ background: filterOnlyAction ? '#1890ff' : undefined }}
                                        />
                                    </Space>
                                    <Divider type="vertical" style={{ height: 24, margin: 0 }} />
                                    <Space size={8}>
                                        <Text type="secondary" style={{ fontSize: 14 }}>自动刷新</Text>
                                        <Select size="small" value={autoRefresh} onChange={setAutoRefresh} style={{ width: 75 }}>
                                            <Option value="Off">关闭</Option>
                                            <Option value="5s">5秒</Option>
                                            <Option value="10s">10秒</Option>
                                            <Option value="30s">30秒</Option>
                                        </Select>
                                    </Space>
                                    <Divider type="vertical" style={{ height: 24, margin: 0 }} />
                                    <Button 
                                        icon={<SettingOutlined />} 
                                        onClick={openThresholdConfig}
                                        style={{ fontSize: 14 }}
                                    >
                                        配置
                                    </Button>
                                </Space>
                            </Form.Item>
                        </Form>
                    </Card>

                    <Card className="main-card" bodyStyle={{ padding: 0 }}>
                        <Table
                            columns={columns}
                            dataSource={sortedData}
                            rowKey="merchant_id"
                            loading={loading}
                            pagination={{ 
                                pageSize: 10, 
                                showSizeChanger: true, 
                                showTotal: t => <Text type="secondary">共 <Text strong>{t}</Text> 条记录</Text>,
                                style: { padding: '12px 16px', margin: 0 }
                            }}
                            scroll={{ x: 1200 }}
                            rowClassName={(r) => DEFAULT_THRESHOLDS[r.risk_level.toUpperCase()]?.bgClass || ''}
                        />
                    </Card>
                </>
            );

            // 侧边栏组件
            const Sidebar = () => (
                <div className="sidebar">
                    <div className="sidebar-logo">
                        <h1>VVOSS Admin</h1>
                        <span>7dd16a0</span>
                    </div>
                    
                    <div className="sidebar-menu">
                        {/* 业务管理 */}
                        <div className="menu-group">
                            <div className="menu-group-title">业务管理</div>
                            <div className="menu-item">
                                <span className="menu-icon">{AppstoreOutlined && <AppstoreOutlined />}</span>
                                平台管理
                            </div>
                            <div className="menu-item">
                                <span className="menu-icon">{ShopOutlined && <ShopOutlined />}</span>
                                商户管理
                            </div>
                            <div className="menu-item">
                                <span className="menu-icon">{TeamOutlined && <TeamOutlined />}</span>
                                客户管理
                            </div>
                            <div className="menu-item">
                                <span className="menu-icon">{ApiOutlined && <ApiOutlined />}</span>
                                激活平台
                            </div>
                            <div className="menu-item">
                                <span className="menu-icon">{ThunderboltOutlined && <ThunderboltOutlined />}</span>
                                能量平台
                            </div>
                        </div>
                        
                        {/* 资金与交易 */}
