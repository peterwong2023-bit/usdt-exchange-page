<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波币AI风险监控系统</title>
    <link rel="stylesheet" href="risk-monitoring-system/styles-v4.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="logo">
                    <img src="bob.png" alt="波币" class="logo-icon">
                    <span class="logo-text">波币AI风险监控系统</span>
                </h1>
                <div class="subtitle-container">
                    <span class="subtitle-cn">抓光所有骗子</span>
                    <span class="subtitle-divider">·</span>
                    <span class="subtitle-en">Anti Scammer</span>
                </div>
            </div>
            
            <!-- 快速搜索 -->
            <div class="header-center">
                <div class="quick-search">
                    <i class="fas fa-search"></i>
                    <input type="text" 
                           placeholder="搜索: 用户ID / 设备指纹 / 支付QR / 银行账号 / IP地址" 
                           id="quickSearch"
                           class="search-input">
                    <button class="search-btn" id="executeSearch">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
            
            <div class="header-right">
                <div class="header-actions">
                    <!-- 告警铃铛按钮 -->
                    <button class="btn btn-icon alert-bell" id="alertBellBtn" title="告警通知">
                        <i class="fas fa-bell"></i>
                        <span class="badge pulse" id="alertBadge">8</span>
                    </button>
                    <button class="btn btn-icon" title="导出报表" id="exportReport">
                        <i class="fas fa-file-export"></i>
                    </button>
                    <button class="btn btn-primary" id="refreshAll">
                        <i class="fas fa-sync-alt"></i>
                        刷新
                    </button>
                    <div class="user-profile">
                        <i class="fas fa-user-circle"></i>
                        <span>运营员</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 视图切换标签 -->
    <nav class="view-tabs">
        <div class="tabs-container">
            <button class="tab-btn active" data-view="overview">
                <i class="fas fa-chart-line"></i>
                概览仪表板
            </button>
            <button class="tab-btn" data-view="users">
                <i class="fas fa-users"></i>
                用户风险列表
            </button>
            <button class="tab-btn" data-view="events">
                <i class="fas fa-exclamation-circle"></i>
                风险事件监控
            </button>
            <button class="tab-btn" data-view="relationships">
                <i class="fas fa-project-diagram"></i>
                关系图谱分析
            </button>
            <button class="tab-btn" data-view="operations">
                <i class="fas fa-tasks"></i>
                运营操作台
            </button>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content">
        <!-- 概览仪表板视图 - 增强版 -->
        <section class="view-section active" id="overviewView">
            <!-- KPI 概览卡片 -->
            <div class="kpi-overview">
                <div class="kpi-card danger">
                    <div class="kpi-icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div class="kpi-content">
                        <div class="kpi-value" id="totalRiskEventsToday">523</div>
                        <div class="kpi-label">今日风险事件</div>
                        <div class="kpi-trend up">
                            <i class="fas fa-arrow-up"></i> 12%
                        </div>
                    </div>
                </div>

                <div class="kpi-card critical">
                    <div class="kpi-icon">
                        <i class="fas fa-fire"></i>
                    </div>
                    <div class="kpi-content">
                        <div class="kpi-value" id="highRiskEvents">12</div>
                        <div class="kpi-label">高危事件</div>
                        <div class="kpi-trend down">
                            <i class="fas fa-arrow-down"></i> 3%
                        </div>
                    </div>
                </div>

                <div class="kpi-card warning">
                    <div class="kpi-icon">
                        <i class="fas fa-user-slash"></i>
                    </div>
                    <div class="kpi-content">
                        <div class="kpi-value" id="newBlacklistedUsers">4</div>
                        <div class="kpi-label">新增黑名单用户</div>
                        <div class="kpi-trend stable">
                            <i class="fas fa-minus"></i> 0%
                        </div>
                    </div>
                </div>

                <div class="kpi-card info">
                    <div class="kpi-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="kpi-content">
                        <div class="kpi-value" id="pendingQueue">47</div>
                        <div class="kpi-label">待处理事件</div>
                        <div class="kpi-trend up">
                            <i class="fas fa-arrow-up"></i> 8%
                        </div>
                    </div>
                </div>

                <div class="kpi-card success">
                    <div class="kpi-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="kpi-content">
                        <div class="kpi-value" id="resolvedToday">156</div>
                        <div class="kpi-label">今日已处理</div>
                        <div class="kpi-trend up">
                            <i class="fas fa-arrow-up"></i> 15%
                        </div>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid-enhanced">
                <!-- AI模型健康监控 -->
                <div class="dashboard-card ai-health">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-brain"></i>
                            AI模型质量监控
                        </h3>
                        <span class="status-indicator success">
                            <i class="fas fa-circle"></i> 运行正常
                        </span>
                    </div>
                    <div class="card-body">
                        <div class="ai-model-grid">
                            <!-- 左侧：命中率圆形显示 -->
                            <div class="hit-rate-circle-container">
                                <div class="section-label">模型表现</div>
                                <div class="hit-rate-circle">
                                    <div class="circle-progress">
                                        <svg width="140" height="140">
                                            <circle cx="70" cy="70" r="60" fill="none" stroke="#e2e8f0" stroke-width="12"/>
                                            <circle cx="70" cy="70" r="60" fill="none" stroke="#10b981" stroke-width="12"
                                                stroke-dasharray="377" stroke-dashoffset="30" stroke-linecap="round"
                                                transform="rotate(-90 70 70)"/>
                                        </svg>
                                        <div class="circle-text">
                                            <div class="circle-value">92</div>
                                            <div class="circle-label">命中率</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 右侧：其他指标 -->
                            <div class="ai-metrics-right">
                                <div class="metric-row">
                                    <div class="metric-box">
                                        <div class="metric-box-label">误报率</div>
                                        <div class="metric-box-value">3%</div>
                                        <div class="progress-bar-thin">
                                            <div class="progress-fill-thin success" style="width: 3%"></div>
                                        </div>
                                    </div>
                                    <div class="metric-box">
                                        <div class="metric-box-label">覆盖率</div>
                                        <div class="metric-box-value">47%</div>
                                        <div class="progress-bar-thin">
                                            <div class="progress-fill-thin warning" style="width: 47%"></div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="metric-row">
                                    <div class="metric-box">
                                        <div class="metric-box-label">今日人工纠正</div>
                                        <div class="metric-box-value highlight">47 <span class="unit">次</span></div>
                                    </div>
                                    <div class="metric-box">
                                        <div class="metric-box-label">训练样本</div>
                                        <div class="metric-box-value highlight">2.8M <span class="unit">条</span></div>
                                    </div>
                                </div>
                                
                                <div class="model-version-box">
                                    <span class="version-label">当前版本:</span>
                                    <span class="version-badge">v2.4.1</span>
                                    <span class="status-dot"></span>
                                    <span class="status-text">运行正常</span>
                                    <button class="btn-update">检查更新</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 地区风险热力图 -->
                <div class="dashboard-card geo-heatmap">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-map-marked-alt"></i>
                            地区风险热力图
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="geo-list" id="geoHeatmapList">
                            <!-- 地区风险数据 -->
                        </div>
                    </div>
                </div>

                <!-- 风险类型趋势 -->
                <div class="dashboard-card risk-type-trend">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-chart-line"></i>
                            风险类型趋势
                        </h3>
                        <div class="card-actions">
                            <select class="select-sm" id="typeTrendPeriod">
                                <option value="7d" selected>近7天</option>
                                <option value="30d">近30天</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="riskTypeTrendChart" style="height: 280px;"></div>
                    </div>
                </div>

                <!-- 风险类别分布 -->
                <div class="dashboard-card risk-distribution">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-chart-pie"></i>
                            风险类别分布
                        </h3>
                    </div>
                    <div class="card-body">
                        <div id="riskDistributionChart" style="height: 280px;"></div>
                    </div>
                </div>

                <!-- 待审核队列 -->
                <div class="dashboard-card pending-review">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-clipboard-check"></i>
                            待审核队列
                        </h3>
                        <button class="btn-sm btn-outline" onclick="app.switchView('users')">
                            查看全部
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="pending-review-list" id="pendingReviewList">
                            <!-- 待审核用户将通过JS动态加载 -->
                        </div>
                    </div>
                </div>

                <!-- 团伙热点榜 -->
                <div class="dashboard-card syndicate-hotspot">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-fire-alt"></i>
                            团伙热点榜
                        </h3>
                        <button class="btn-sm btn-outline" onclick="app.switchView('relationships')">
                            关系图谱
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="syndicate-hotspot-list" id="syndicateHotspotList">
                            <!-- 团伙热点数据 -->
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- 其他视图页面保持V3版本... -->
        <section class="view-section" id="usersView">
            <div class="coming-soon">
                <i class="fas fa-users"></i>
                <h3>用户风险列表</h3>
                <p>此页面保持V3版本功能</p>
            </div>
        </section>
    </main>

    <!-- 右下角告警弹窗（继承V3） -->
    <div class="alert-popup" id="alertPopup">
        <div class="alert-popup-header">
            <h3>
                <i class="fas fa-bell"></i>
                实时告警中心
                <span class="alert-count" id="popupAlertCount">8</span>
            </h3>
            <div class="alert-popup-actions">
                <button class="btn-icon-sm" id="markAllReadBtn" title="全部已读">
                    <i class="fas fa-check-double"></i>
                </button>
                <button class="btn-icon-sm" id="closeAlertPopup" title="关闭">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        <div class="alert-popup-body" id="alertPopupBody">
            <!-- 告警列表将通过JS动态加载 -->
        </div>
        <div class="alert-popup-footer">
            <button class="btn-text" id="viewAllAlerts">查看全部告警</button>
        </div>
    </div>

    <!-- 加载提示 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>数据加载中...</p>
        </div>
    </div>

    <!-- 通知提示容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 脚本文件 -->
    <script src="risk-monitoring-system/data-v2.js"></script>
    <script src="risk-monitoring-system/data-v4.js"></script>
    <script src="risk-monitoring-system/app-v3.js"></script>
    <script src="risk-monitoring-system/app-v4.js"></script>
</body>
</html>
