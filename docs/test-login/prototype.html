</head>
<body>
    <!-- 顶部导航 -->
    <header class="top-nav">
        <div class="nav-brand">
            <div style="width: 32px; height: 32px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 14px;">B</div>
            <span>波币交易系统</span>
        </div>
        <div class="nav-right">
            <a href="#" class="nav-link">帮助中心</a>
            <a href="#" class="nav-link">客服支持</a>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="main-content">
        <div class="login-container">
            <!-- 登录标题 -->
            <div class="login-header">
                <h1>欢迎回来</h1>
                <p>请选择您的登录方式</p>
            </div>

            <!-- 状态消息 -->
            <div id="statusMessage" class="hidden"></div>

            <!-- 登录方式选择 -->
            <div class="login-methods">
                <button class="method-tab active" onclick="switchLoginMethod('otp')">
                    <i class="fas fa-mobile-alt"></i> 手机/邮箱验证
                </button>
                <button class="method-tab" onclick="switchLoginMethod('password')">
                    <i class="fas fa-lock"></i> 账号密码
                </button>
            </div>

            <!-- OTP 登录表单 -->
            <div id="otpForm" class="login-form active">
                <form onsubmit="handleOtpLogin(event)">
                    <div class="form-group">
                        <label class="form-label">手机号或邮箱</label>
                        <input type="text" class="form-input" id="otpIdentifier" placeholder="请输入手机号或邮箱地址" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="input-group">
                            <input type="text" class="form-input" id="otpCode" placeholder="请输入6位验证码" maxlength="6" style="padding-right: 100px;">
                            <div class="input-addon">
                                <button type="button" id="sendOtpBtn" class="otp-button" onclick="sendOtp()">获取验证码</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberDevice">
                            30天内免登录
                        </label>
                    </div>

                    <button type="submit" class="login-button" id="otpLoginBtn">
                        登录
                    </button>
                </form>
            </div>

            <!-- 密码登录表单 -->
            <div id="passwordForm" class="login-form">
                <form onsubmit="handlePasswordLogin(event)">
                    <div class="form-group">
                        <label class="form-label">用户名或邮箱</label>
                        <input type="text" class="form-input" id="username" placeholder="请输入用户名或邮箱" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberPassword">
                            记住密码
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>

                    <button type="submit" class="login-button" id="passwordLoginBtn">
                        登录
                    </button>
                </form>
            </div>

            <!-- 登录成功后的设备管理区域（隐藏） -->
            <div id="deviceSection" class="device-section hidden">
                <div class="device-header">
                    <h3 style="font-size: 16px; font-weight: 700; color: #374151;">
                        <i class="fas fa-devices"></i> 设备管理
                    </h3>
                    <button class="btn-sm btn-danger" onclick="logoutAllDevices()">
                        <i class="fas fa-sign-out-alt"></i> 退出所有设备
                    </button>
                </div>

                <div class="device-list" id="deviceList">
                    <!-- 设备列表将由 JavaScript 生成 -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // 应用状态
        const appState = {
            loginMethod: 'otp',
            otpCountdown: 0,
            isLoggedIn: false,
            currentUser: null
        };

        // Mock 数据
        const mockUsers = [
            {
                id: 'user001',
                username: 'testuser',
                email: 'test@example.com',
                phone: '13800138000',
                passwordHash: 'mock_hash_123456'
            },
            {
                id: 'user002',
                username: 'admin',
                email: 'admin@bob.com',
                phone: '13900139000',
                passwordHash: 'mock_hash_admin123'
            }
        ];

        const mockDevices = [
            {
                id: 'device001',
                type: 'Chrome on Windows',
                ip: '192.168.1.100',
                lastSeen: '2024-01-15 14:30:25',
                isCurrent: true
            },
            {
                id: 'device002',
                type: 'Safari on iPhone',
                ip: '192.168.1.101',
                lastSeen: '2024-01-15 09:15:42',
                isCurrent: false
            },
            {
                id: 'device003',
                type: 'Firefox on macOS',
                ip: '192.168.1.102',
                lastSeen: '2024-01-14 16:22:18',
                isCurrent: false
            }
        ];

        // 切换登录方式
        function switchLoginMethod(method) {
            appState.loginMethod = method;
            
            // 更新 tab 状态
            document.querySelectorAll('.method-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // 切换表单
            document.querySelectorAll('.login-form').forEach(form => {
                form.classList.remove('active');
            });
            
            if (method === 'otp') {
                document.getElementById('otpForm').classList.add('active');
            } else {
                document.getElementById('passwordForm').classList.add('active');
            }

            clearStatusMessage();
        }

        // 发送 OTP
        function sendOtp() {
            const identifier = document.getElementById('otpIdentifier').value.trim();
            
            if (!identifier) {
                showMessage('请输入手机号或邮箱地址', 'error');
                return;
            }

            // 验证格式
            const phoneRegex = /^1[3-9]\d{9}$/;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!phoneRegex.test(identifier) && !emailRegex.test(identifier)) {
                showMessage('请输入有效的手机号或邮箱地址', 'error');
                return;
            }

            // 模拟发送 OTP
            const sendBtn = document.getElementById('sendOtpBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="spinner"></span>发送中...';

            setTimeout(() => {
                showMessage(`验证码已发送至 ${maskIdentifier(identifier)}`, 'success');
                startOtpCountdown();
            }, 1000);
        }

        // 开始 OTP 倒计时
        function startOtpCountdown() {
            const sendBtn = document.getElementById('sendOtpBtn');
            let countdown = 60;
            appState.otpCountdown = countdown;

            const timer = setInterval(() => {
                countdown--;
                sendBtn.textContent = `${countdown}s 后重试`;
                sendBtn.className = 'otp-button countdown';
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    sendBtn.textContent = '重新发送';
                    sendBtn.className = 'otp-button';
                    sendBtn.disabled = false;
                    appState.otpCountdown = 0;
                }
            }, 1000);
        }

        // 处理 OTP 登录
        function handleOtpLogin(event) {
            event.preventDefault();
            
            const identifier = document.getElementById('otpIdentifier').value.trim();
            const otp = document.getElementById('otpCode').value.trim();
            const rememberDevice = document.getElementById('rememberDevice').checked;
            
            if (!identifier || !otp) {
                showMessage('请填写完整的登录信息', 'error');
                return;
            }

            if (otp.length !== 6) {
                showMessage('验证码应为6位数字', 'error');
                return;
            }

            // 模拟登录
            const loginBtn = document.getElementById('otpLoginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>登录中...';

            setTimeout(() => {
                // 模拟验证码验证（简单 mock）
                const validCodes = ['123456', '888888', '000000'];
                
                if (validCodes.includes(otp)) {
                    // 登录成功
                    const user = mockUsers.find(u => u.email === identifier || u.phone === identifier) || mockUsers[0];
                    loginSuccess(user, rememberDevice);
                } else {
                    // 登录失败
                    showMessage('验证码错误，您还有4次机会', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            }, 1500);
        }

        // 处理密码登录
        function handlePasswordLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberPassword = document.getElementById('rememberPassword').checked;
            
            if (!username || !password) {
                showMessage('请填写完整的登录信息', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('密码长度不能少于6位', 'error');
                return;
            }

            // 模拟登录
            const loginBtn = document.getElementById('passwordLoginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>登录中...';

            setTimeout(() => {
                // 模拟密码验证
                const validCredentials = [
                    { username: 'testuser', password: '123456' },
                    { username: 'admin', password: 'admin123' },
                    { username: 'test@example.com', password: '123456' }
                ];
                
                const isValid = validCredentials.some(cred => 
                    cred.username === username && cred.password === password
                );
                
                if (isValid) {
                    // 登录成功
                    const user = mockUsers.find(u => u.username === username || u.email === username) || mockUsers[0];
                    loginSuccess(user, rememberPassword);
                } else {
                    // 登录失败
                    showMessage('账号或密码错误', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            }, 1500);
        }

        // 登录成功处理
        function loginSuccess(user, remember) {
            appState.isLoggedIn = true;
            appState.currentUser = user;
            
            showMessage('登录成功！正在跳转...', 'success');
            
            // 重置按钮状态
            document.querySelectorAll('.login-button').forEach(btn => {
                btn.disabled = false;
                btn.textContent = '登录';
            });
            
            // 显示设备管理区域
            setTimeout(() => {
                document.getElementById('deviceSection').classList.remove('hidden');
                loadDeviceList();
                showMessage('登录成功！您现在可以管理您的登录设备。', 'success');
            }, 1500);
        }

        // 加载设备列表
        function loadDeviceList() {
            const deviceList = document.getElementById('deviceList');
            deviceList.innerHTML = '';
            
            mockDevices.forEach(device => {
                const deviceItem = document.createElement('div');
                deviceItem.className = 'device-item';
                deviceItem.innerHTML = `
                    <div class="device-info">
                        <div class="device-name">
                            <i class="fas fa-${getDeviceIcon(device.type)}"></i>
                            ${device.type}
                            ${device.isCurrent ? '<span style="color: #22c55e; font-weight: 600; font-size: 12px; margin-left: 8px;">(当前设备)</span>' : ''}
                        </div>
                        <div class="device-meta">
                            IP: ${device.ip} • 最近登录: ${device.lastSeen}
                        </div>
                    </div>
                    <div class="device-actions">
                        ${!device.isCurrent ? `
                            <button class="btn-sm btn-danger" onclick="removeDevice('${device.id}')">
                                <i class="fas fa-times"></i> 移除
                            </button>
                        ` : ''}
                    </div>
                `;
                deviceList.appendChild(deviceItem);
            });
        }

        // 获取设备图标
        function getDeviceIcon(deviceType) {
            if (deviceType.includes('iPhone') || deviceType.includes('Android')) {
                return 'mobile-alt';
            } else if (deviceType.includes('iPad') || deviceType.includes('Tablet')) {
                return 'tablet-alt';
            } else {
                return 'desktop';
            }
        }

        // 移除设备
        function removeDevice(deviceId) {
            if (confirm('确定要移除此设备吗？该设备将被强制退出登录。')) {
                const deviceIndex = mockDevices.findIndex(d => d.id === deviceId);
                if (deviceIndex > -1) {
                    mockDevices.splice(deviceIndex, 1);
                    loadDeviceList();
                    showMessage('设备已移除', 'success');
                }
            }
        }

        // 退出所有设备
        function logoutAllDevices() {
            if (confirm('确定要退出所有设备吗？您将需要重新登录。')) {
                // 模拟退出所有设备
                showMessage('正在退出所有设备...', 'warning');
                
                setTimeout(() => {
                    // 重置应用状态
                    appState.isLoggedIn = false;
                    appState.currentUser = null;
                    
                    // 隐藏设备管理区域
                    document.getElementById('deviceSection').classList.add('hidden');
                    
                    // 清空表单
                    document.querySelectorAll('input').forEach(input => {
                        if (input.type !== 'checkbox') {
                            input.value = '';
                        } else {
                            input.checked = false;
                        }
                    });
                    
                    showMessage('已退出所有设备，请重新登录', 'success');
                }, 2000);
            }
        }

        // 显示状态消息
        function showMessage(message, type) {
            const messageEl = document.getElementById('statusMessage');
            messageEl.className = `alert alert-${type}`;
            messageEl.textContent = message;
            messageEl.classList.remove('hidden');
            
            // 3秒后自动隐藏（错误消息除外）
            if (type !== 'error') {
                setTimeout(() => {
                    messageEl.classList.add('hidden');
                }, 3000);
            }
        }

        // 清除状态消息
        function clearStatusMessage() {
            document.getElementById('statusMessage').classList.add('hidden');
        }

        // 掩码处理敏感信息
        function maskIdentifier(identifier) {
            if (identifier.includes('@')) {
                // 邮箱掩码
                const [username, domain] = identifier.split('@');
                return username.substring(0, 2) + '***@' + domain;
            } else {
                // 手机号掩码
                return identifier.substring(0, 3) + '****' + identifier.substring(7);
            }
        }

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 监听 Enter 键
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const activeForm = document.querySelector('.login-form.active');
                    const submitBtn = activeForm.querySelector('button[type="submit"]');
                    if (submitBtn && !submitBtn.disabled) {
                        submitBtn.click();
                    }
                }
            });

            // 验证码输入框只允许数字
            document.getElementById('otpCode').addEventListener('input', function(e) {
                e.target.value = e.target.value.replace(/\D/g, '');
            });

            // 手机号输入框格式化
