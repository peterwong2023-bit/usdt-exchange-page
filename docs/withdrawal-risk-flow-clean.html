<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出款风控示意图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      min-height: 100vh;
      padding: 50px 30px;
      color: #1e293b;
    }

    .container {
      max-width: 1650px;
      margin: 0 auto 40px;
      background: #FFFFFF;
      border-radius: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03), 0 20px 50px -12px rgba(0,0,0,0.08);
      padding: 56px;
    }

    .title {
      text-align: center;
      margin-bottom: 50px;
    }

    .title h1 {
      font-size: 32px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .title h1 span {
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title p {
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .diagram-wrapper {
      overflow-x: auto;
      padding: 20px 0;
      display: flex;
      justify-content: center;
    }

    .legend {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 32px;
      margin-top: 50px;
      padding-top: 28px;
      border-top: 1px solid #f1f5f9;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .legend-color.primary { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }
    .legend-color.green { background: linear-gradient(135deg, #22c55e, #4ade80); }
    .legend-color.amber { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .legend-color.orange { background: linear-gradient(135deg, #f97316, #fb923c); }
    .legend-color.red { background: linear-gradient(135deg, #ef4444, #f87171); }

    .legend-note {
      font-size: 12px;
      color: #94a3b8;
      padding-left: 24px;
      border-left: 2px solid #e2e8f0;
    }

    /* Section 2 Styles */
    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .section-title h2 {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .section-title h2 span {
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-title p {
      font-size: 13px;
      color: #94a3b8;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- ========== SECTION 1: 风控路径示意图 ========== -->
  <div class="container">
    <div class="title">
      <h1>整套风控路径示意图<span>（出款风控）</span></h1>
      <p>Withdrawal Risk Control Flow Diagram</p>
    </div>

    <div class="diagram-wrapper">
      <svg width="1440" height="720" viewBox="0 0 1440 720" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Gradients -->
          <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0ea5e9"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
          <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22c55e"/>
            <stop offset="100%" stop-color="#4ade80"/>
          </linearGradient>
          <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#fbbf24"/>
          </linearGradient>
          <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="100%" stop-color="#fb923c"/>
          </linearGradient>
          <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#f87171"/>
          </linearGradient>

          <!-- Arrows -->
          <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
            <path d="M0,1 L8,4 L0,7" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
          <marker id="arrowGray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
            <path d="M0,1 L8,4 L0,7" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>

          <!-- Shadows -->
          <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="145%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0ea5e9" flood-opacity="0.1"/>
          </filter>
          <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#64748b" flood-opacity="0.06"/>
          </filter>
        </defs>

        <!-- ========== MAIN FLOW ========== -->

        <!-- 1. 出款请求 -->
        <g id="node-withdraw" transform="translate(25, 60)">
          <rect x="0" y="0" width="110" height="68" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#softShadow)"/>
          <rect x="0" y="0" width="110" height="4" rx="2" fill="url(#primaryGrad)"/>
          <text x="55" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">出款请求</text>
          <text x="55" y="50" text-anchor="middle" font-size="10" fill="#94a3b8">Withdraw Request</text>
        </g>

        <path d="M140,94 L175,94" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

        <!-- 2. 基础校验 -->
        <g id="node-precheck" transform="translate(188, 45)">
          <rect x="0" y="0" width="115" height="98" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#softShadow)"/>
          <rect x="0" y="0" width="115" height="4" rx="2" fill="#94a3b8"/>
          <text x="57" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">基础校验</text>
          <text x="57" y="50" text-anchor="middle" font-size="11" fill="#64748b">商户状态</text>
          <text x="57" y="66" text-anchor="middle" font-size="11" fill="#64748b">钱包状态</text>
          <text x="57" y="82" text-anchor="middle" font-size="11" fill="#94a3b8">余额是否充足</text>
        </g>

        <path d="M308,94 L343,94" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

        <!-- 3. 风控引擎 -->
        <g id="node-engine" transform="translate(356, 50)">
          <rect x="0" y="0" width="125" height="88" rx="12" fill="url(#primaryGrad)" filter="url(#cardShadow)"/>
          <g transform="translate(52, 14)">
            <circle cx="10" cy="10" r="4" fill="none" stroke="#fff" stroke-width="1.5"/>
            <g stroke="#fff" stroke-width="1.5" stroke-linecap="round">
              <path d="M10,2 L10,4"/><path d="M10,16 L10,18"/>
              <path d="M2,10 L4,10"/><path d="M16,10 L18,10"/>
              <path d="M4.5,4.5 L6,6"/><path d="M14,14 L15.5,15.5"/>
              <path d="M4.5,15.5 L6,14"/><path d="M14,6 L15.5,4.5"/>
            </g>
          </g>
          <text x="62" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">进入风控引擎</text>
          <text x="62" y="70" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Risk Engine</text>
        </g>

        <!-- Split -->
        <path d="M486,94 L515,94" stroke="#0ea5e9" stroke-width="2" fill="none"/>
        <circle cx="515" cy="94" r="4" fill="#0ea5e9"/>
        <path d="M515,94 L515,44" stroke="#0ea5e9" stroke-width="2" fill="none"/>
        <path d="M515,94 L515,144" stroke="#0ea5e9" stroke-width="2" fill="none"/>
        <path d="M515,44 L540,44" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
        <path d="M515,94 L540,94" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
        <path d="M515,144 L540,144" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

        <!-- 4. 三条规则 -->
        <g id="node-rule-a" transform="translate(553, 14)">
          <rect x="0" y="0" width="160" height="60" rx="10" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5" filter="url(#softShadow)"/>
          <text x="80" y="26" text-anchor="middle" font-size="12" font-weight="600" fill="#0369a1">a. 单笔金额异常</text>
          <text x="80" y="44" text-anchor="middle" font-size="10" fill="#64748b">amount vs P99_30d</text>
        </g>

        <g id="node-rule-b" transform="translate(553, 84)">
          <rect x="0" y="0" width="160" height="60" rx="10" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5" filter="url(#softShadow)"/>
          <text x="80" y="26" text-anchor="middle" font-size="12" font-weight="600" fill="#0369a1">b. 累计金额异常</text>
          <text x="80" y="44" text-anchor="middle" font-size="10" fill="#64748b">sum_W vs baseline × K</text>
        </g>

        <g id="node-rule-c" transform="translate(553, 154)">
          <rect x="0" y="0" width="160" height="60" rx="10" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5" filter="url(#softShadow)"/>
          <text x="80" y="26" text-anchor="middle" font-size="12" font-weight="600" fill="#0369a1">c. 地址集中度异常</text>
          <text x="80" y="44" text-anchor="middle" font-size="10" fill="#64748b">金额占比 top1/top2</text>
        </g>

        <text x="633" y="238" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="500">并行 3 条规则</text>

        <!-- Merge -->
        <path d="M718,44 L745,44" stroke="#0ea5e9" stroke-width="2" fill="none"/>
        <path d="M718,114 L745,114" stroke="#0ea5e9" stroke-width="2" fill="none"/>
        <path d="M718,184 L745,184" stroke="#0ea5e9" stroke-width="2" fill="none"/>
        <path d="M745,44 L745,184" stroke="#0ea5e9" stroke-width="2" fill="none"/>
        <circle cx="745" cy="114" r="4" fill="#0ea5e9"/>
        <path d="M745,114 L780,114" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

        <!-- 5. 规则聚合 -->
        <g id="node-aggregate" transform="translate(793, 74)">
          <rect x="0" y="0" width="135" height="80" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#softShadow)"/>
          <rect x="0" y="0" width="135" height="4" rx="2" fill="#06b6d4"/>
          <text x="67" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">规则命中聚合</text>
          <text x="67" y="52" text-anchor="middle" font-size="11" fill="#64748b">仅金额规则计分</text>
          <text x="67" y="68" text-anchor="middle" font-size="10" fill="#94a3b8">笔数/频率不参与</text>
        </g>

        <path d="M933,114 L968,114" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

        <!-- 6. RiskScore -->
        <g id="node-score" transform="translate(981, 58)">
          <rect x="0" y="0" width="135" height="112" rx="12" fill="url(#primaryGrad)" filter="url(#cardShadow)"/>
          <g transform="translate(55, 14)">
            <rect x="0" y="0" width="22" height="18" rx="3" fill="none" stroke="#fff" stroke-width="1.5"/>
            <rect x="3" y="3" width="16" height="5" rx="1.5" fill="rgba(255,255,255,0.35)"/>
            <circle cx="6" cy="13" r="1.5" fill="#fff"/>
            <circle cx="11" cy="13" r="1.5" fill="#fff"/>
            <circle cx="16" cy="13" r="1.5" fill="#fff"/>
          </g>
          <text x="67" y="50" text-anchor="middle" font-size="11" font-weight="500" fill="rgba(255,255,255,0.9)">计算 RiskScore</text>
          <text x="67" y="80" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">0–100</text>
          <text x="67" y="100" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">UI 可显示 100+</text>
        </g>

        <path d="M1048,175 L1048,260" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

        <!-- ========== LEFT LABELS ========== -->

        <g transform="translate(30, 290)">
          <rect x="0" y="0" width="130" height="48" rx="10" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
          <text x="65" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#0369a1">四态判定</text>
          <text x="65" y="38" text-anchor="middle" font-size="9" fill="#38bdf8">Four State Determination</text>
        </g>

        <g transform="translate(30, 350)">
          <rect x="0" y="0" width="130" height="48" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
          <text x="65" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">动作层</text>
          <text x="65" y="38" text-anchor="middle" font-size="9" fill="#fb923c">Action Layer</text>
        </g>

        <!-- ========== FOUR STATES ========== -->

        <g id="state-normal" transform="translate(870, 275)">
          <rect x="0" y="0" width="195" height="58" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#softShadow)"/>
          <circle cx="30" cy="29" r="12" fill="url(#greenGrad)"/>
          <path d="M25,29 L28,32 L35,25" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="118" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">正常观察</text>
          <text x="118" y="44" text-anchor="middle" font-size="10" fill="#4ade80" font-weight="500">score &lt; 40 · NORMAL</text>
        </g>

        <g id="state-warning" transform="translate(870, 343)">
          <rect x="0" y="0" width="195" height="58" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5" filter="url(#softShadow)"/>
          <circle cx="30" cy="29" r="12" fill="url(#amberGrad)"/>
          <g transform="translate(23, 22)">
            <polygon points="7,0 14,12 0,12" fill="#fff"/>
            <path d="M7,4 L7,7" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="7" cy="9.5" r="1" fill="#f59e0b"/>
          </g>
          <text x="118" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#a16207">警告</text>
          <text x="118" y="44" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="500">40 – 69 · WARNING</text>
        </g>

        <g id="state-limited" transform="translate(870, 411)">
          <rect x="0" y="0" width="195" height="58" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#softShadow)"/>
          <circle cx="30" cy="29" r="12" fill="url(#orangeGrad)"/>
          <g transform="translate(24, 23)">
            <circle cx="6" cy="6" r="5" fill="none" stroke="#fff" stroke-width="1.5"/>
            <path d="M2,10 L10,2" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          </g>
          <text x="118" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">限制</text>
          <text x="118" y="44" text-anchor="middle" font-size="10" fill="#fb923c" font-weight="500">70 – 99 · LIMITED</text>
        </g>

        <g id="state-highrisk" transform="translate(870, 479)">
          <rect x="0" y="0" width="195" height="58" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#softShadow)"/>
          <circle cx="30" cy="29" r="12" fill="url(#redGrad)"/>
          <rect x="24" y="27" width="12" height="4" rx="2" fill="#fff"/>
          <text x="118" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#b91c1c">高危限制</text>
          <text x="118" y="44" text-anchor="middle" font-size="10" fill="#f87171" font-weight="500">≥ 100 · HIGH RISK</text>
        </g>

        <!-- State Bracket -->
        <path d="M1075,288 C1098,288 1098,310 1098,332 L1098,390 C1098,405 1115,405 1115,405 C1098,405 1098,405 1098,420 L1098,478 C1098,500 1098,522 1075,522" 
              stroke="url(#primaryGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <text x="1135" y="398" font-size="14" font-weight="700" fill="#0ea5e9">态势</text>
        <text x="1135" y="416" font-size="10" fill="#38bdf8" font-weight="500">(State)</text>

        <!-- ========== ACTIONS ========== -->

        <g id="action-warning" transform="translate(1180, 318)">
          <rect x="0" y="0" width="165" height="52" rx="10" fill="#fff" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#softShadow)"/>
          <text x="82" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">标记 / 提示 / 上报</text>
          <text x="82" y="40" text-anchor="middle" font-size="9" fill="#94a3b8">WARNING Action</text>
        </g>

        <g id="action-limited" transform="translate(1180, 380)">
          <rect x="0" y="0" width="165" height="52" rx="10" fill="#fff" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#softShadow)"/>
          <text x="82" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">限速 / 限额</text>
          <text x="82" y="40" text-anchor="middle" font-size="9" fill="#94a3b8">LIMITED Action</text>
        </g>

        <g id="action-highrisk" transform="translate(1180, 442)">
          <rect x="0" y="0" width="165" height="52" rx="10" fill="#fff" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#softShadow)"/>
          <text x="82" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#b91c1c">暂停自动出款（人工审核）</text>
          <text x="82" y="40" text-anchor="middle" font-size="9" fill="#94a3b8">HIGH RISK Action</text>
        </g>

        <!-- Action Bracket -->
        <path d="M1355,332 C1378,332 1378,354 1378,376 L1378,404 C1378,418 1395,418 1395,418 C1378,418 1378,418 1378,432 L1378,460 C1378,482 1378,504 1355,504" 
              stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round"/>
        <text x="1415" y="412" font-size="12" font-weight="700" fill="#06b6d4">处置动作</text>
        <text x="1415" y="428" font-size="10" fill="#22d3ee" font-weight="500">(Action)</text>

        <!-- Dashed Arrows -->
        <path d="M1070,372 L1110,372 Q1130,372 1130,355 L1130,344 L1175,344" stroke="#d1d5db" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)" stroke-dasharray="5,3"/>
        <path d="M1070,440 L1110,440 Q1135,440 1135,420 L1135,406 L1175,406" stroke="#d1d5db" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)" stroke-dasharray="5,3"/>
        <path d="M1070,508 L1110,508 Q1140,508 1140,482 L1140,468 L1175,468" stroke="#d1d5db" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)" stroke-dasharray="5,3"/>

        <!-- Note -->
        <g transform="translate(1080, 550)">
          <rect x="0" y="0" width="200" height="36" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
          <text x="100" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">态势（State）≠ 动作（Action）</text>
        </g>

        <!-- ========== RESULT ========== -->

        <path d="M967,542 L967,608" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

        <g id="node-store" transform="translate(775, 620)">
          <rect x="0" y="0" width="385" height="68" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#softShadow)"/>
          <rect x="0" y="0" width="385" height="4" rx="2" fill="url(#primaryGrad)"/>
          <g transform="translate(155, 16)">
            <ellipse cx="10" cy="4" rx="9" ry="3.5" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
            <path d="M1,4 L1,18 C1,20 5,22 10,22 C15,22 19,20 19,18 L19,4" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
            <path d="M1,11 C1,13 5,15 10,15 C15,15 19,13 19,11" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
          </g>
          <text x="215" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">结果落库</text>
          <text x="215" y="50" text-anchor="middle" font-size="10" fill="#64748b">风险记录 · 命中规则 · 分数快照 · 状态（State）· 动作（Action）</text>
        </g>

        <!-- Steps -->
        <g fill="#cbd5e1" font-size="11" font-weight="600">
          <text x="80" y="148">①</text>
          <text x="245" y="162">②</text>
