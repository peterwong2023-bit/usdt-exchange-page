<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Architecture | Secure Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Outfit:wght@100;300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config({
            theme: {
                extend: {
                    colors: {
                        'void': '#08080a',
                        'amber-tech': '#f59e0b',
                        'industrial-gray': '#1c1c21',
                    },
                    fontFamily: {
                        display: ['Cormorant Garamond', 'serif'],
                        sans: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'float-slow': 'float 20s ease-in-out infinite',
                        'shimmer': 'shimmer 3s linear infinite',
                        'border-draw': 'borderDraw 1.5s cubic-bezier(0.645, 0.045, 0.355, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-40px) rotate(5deg)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                        borderDraw: {
                            '0%': { width: '0%', height: '0%' },
                            '100%': { width: '100%', height: '100%' },
                        }
                    }
                }
            }
        });
    </script>
    <style>
        :root {
            --accent: #f59e0b;
        }

        body {
            background-color: #08080a;
            color: #f8fafc;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* Noise Texture Overlay */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 50;
        }

        /* 3D Geometric Background */
        .geometry-container {
            position: fixed;
            inset: 0;
            perspective: 1000px;
            z-index: -1;
        }

        .monolith {
            position: absolute;
            background: linear-gradient(135deg, rgba(28, 28, 33, 0.8), rgba(8, 8, 10, 0.9));
            border: 1px solid rgba(245, 158, 11, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        /* Floating Monoliths */
        .m-1 { top: 10%; left: 5%; width: 200px; height: 350px; transform: rotateY(25deg); animation: float 15s ease-in-out infinite; }
        .m-2 { bottom: 5%; right: 10%; width: 250px; height: 400px; transform: rotateY(-15deg); animation: float 18s ease-in-out infinite reverse; }
        .m-3 { top: 40%; right: 20%; width: 100px; height: 100px; transform: rotateX(45deg); animation: float 12s ease-in-out infinite; }

        /* Custom Input Styling */
        .input-nexus {
            background: transparent;
            border-bottom: 1px solid rgba(248, 250, 252, 0.1);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .input-nexus:focus {
            outline: none;
            border-bottom-color: var(--accent);
            padding-left: 8px;
        }

        /* Glowing Button */
        .btn-nexus {
            position: relative;
            background: var(--accent);
            color: #08080a;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-nexus:hover {
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.4);
            transform: translateY(-2px);
        }

        .btn-nexus::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-nexus:hover::after {
            left: 100%;
        }

        /* Vertical Lines Decor */
        .v-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(245, 158, 11, 0.2), transparent);
            height: 100%;
        }

        .reveal-text {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            animation: reveal 1s ease-out forwards;
        }

        @keyframes reveal {
            from { clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%); transform: translateY(20px); }
            to { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transform: translateY(0); }
        }

        /* Gold Gradient Text */
        .text-gold {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="noise"></div>
    
    <!-- Background Decor -->
    <div class="geometry-container">
        <div class="monolith m-1"></div>
        <div class="monolith m-2"></div>
        <div class="monolith m-3"></div>
        
        <div class="v-line" style="left: 15%;"></div>
        <div class="v-line" style="left: 85%;"></div>
    </div>

    <!-- Main Auth Card -->
    <main class="relative z-10 w-full max-w-xl">
        <div class="flex flex-col md:flex-row bg-industrial-gray/40 backdrop-blur-2xl border border-white/5 overflow-hidden">
            
            <!-- Branding Side -->
            <div class="w-full md:w-2/5 p-8 flex flex-col justify-between border-b md:border-b-0 md:border-r border-white/5 relative">
                <div class="absolute top-0 left-0 w-8 h-8 border-t border-l border-amber-tech/40"></div>
                
                <div>
                    <div class="w-12 h-12 border border-amber-tech/30 flex items-center justify-center mb-12 relative group">
                        <div class="absolute inset-0 bg-amber-tech/5 scale-0 group-hover:scale-100 transition-transform"></div>
                        <svg class="w-6 h-6 text-amber-tech" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12" />
                        </svg>
                    </div>
                    
                    <h2 class="font-display text-4xl mb-4 reveal-text italic" style="animation-delay: 0.2s;">
                        Universal<br/>
                        <span class="font-sans font-thin tracking-widest text-white not-italic uppercase text-sm block mt-2 opacity-50">Secure Hub</span>
                    </h2>
                </div>

                <div class="space-y-4 reveal-text" style="animation-delay: 0.4s;">
                    <p class="text-[10px] uppercase tracking-[0.3em] text-amber-tech font-semibold">Node Status</p>
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-amber-tech animate-pulse"></div>
                        <span class="text-[10px] text-white/40 tracking-widest uppercase">Encryption Active: AES-256</span>
                    </div>
                </div>
            </div>

            <!-- Form Side -->
            <div class="w-full md:w-3/5 p-8 md:p-12">
                <header class="mb-12">
                    <h1 class="text-3xl font-light tracking-tight text-white mb-2">Identify Yourself</h1>
                    <p class="text-xs text-white/30 uppercase tracking-[0.2em]">Enter credentials to access the Nexus.</p>
                </header>

                <form class="space-y-8">
                    <div class="relative group">
                        <label class="absolute -top-6 left-0 text-[10px] uppercase tracking-widest text-amber-tech/60 transition-all group-focus-within:text-amber-tech">Entity ID</label>
                        <input type="text" class="input-nexus w-full py-3 text-white font-light tracking-wide" placeholder="USER_IDENTIFIER">
                    </div>

                    <div class="relative group">
                        <label class="absolute -top-6 left-0 text-[10px] uppercase tracking-widest text-amber-tech/60 transition-all group-focus-within:text-amber-tech">Access Key</label>
                        <input type="password" class="input-nexus w-full py-3 text-white font-light tracking-wide" placeholder="••••••••••••">
                    </div>

                    <div class="flex items-center justify-between py-2">
                        <div class="flex items-center gap-3 group cursor-pointer">
                            <div class="w-4 h-4 border border-white/20 rounded-sm flex items-center justify-center group-hover:border-amber-tech transition-colors">
                                <div class="w-2 h-2 bg-amber-tech opacity-0 transition-opacity" id="remember-mark"></div>
                            </div>
                            <span class="text-[10px] uppercase tracking-widest text-white/40 group-hover:text-white/60">Persistent Session</span>
                        </div>
                        <a href="#" class="text-[10px] uppercase tracking-widest text-amber-tech/40 hover:text-amber-tech transition-colors">Key Recovery</a>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="btn-nexus w-full py-4 text-[10px] font-bold uppercase tracking-[0.4em] reveal-text" style="animation-delay: 0.6s;">
                            Initialize Access
                        </button>
                    </div>
                </form>

                <footer class="mt-12 flex items-center justify-between text-[8px] text-white/20 uppercase tracking-[0.2em]">
                    <span>© 2026 Nexus Core</span>
                    <div class="flex gap-4">
                        <a href="#" class="hover:text-white transition-colors">Protocols</a>
                        <a href="#" class="hover:text-white transition-colors">Network</a>
                    </div>
                </footer>
            </div>
        </div>
    </main>

    <!-- Page Transition Overlay -->
    <div class="fixed inset-0 bg-void z-50 pointer-events-none flex items-center justify-center" id="loader">
        <div class="w-48 h-[1px] bg-white/5 relative overflow-hidden">
            <div class="absolute inset-0 bg-amber-tech w-0" id="loader-bar"></div>
        </div>
    </div>

    <script>
        // Fake Loading Animation
        window.addEventListener('load', () => {
            const bar = document.getElementById('loader-bar');
            const loader = document.getElementById('loader');
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 30;
                bar.style.width = `${Math.min(progress, 100)}%`;
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 500);
                    }, 400);
                }
            }, 100);
        });

        // Mouse Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            document.querySelectorAll('.monolith').forEach((m, i) => {
                const speed = (i + 1) * 0.5;
                m.style.transform = `translate3d(${x * speed}px, ${y * speed}px, 0) rotateY(${20 + x * 0.1}deg)`;
            });
        });
    </script>
</body>
</html>
