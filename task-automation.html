<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>任务自动化</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --glass: rgba(255,255,255,0.08);
  --glass-h: rgba(255,255,255,0.12);
  --border: rgba(255,255,255,0.12);
  --border-l: rgba(255,255,255,0.06);
  --blur: 48px;

  --blue: #0A84FF;
  --blue-d: rgba(10,132,255,0.15);
  --green: #30D158;
  --green-d: rgba(48,209,88,0.12);
  --red: #FF453A;
  --red-d: rgba(255,69,58,0.12);
  --orange: #FF9F0A;

  --w: #FFFFFF;
  --t1: rgba(255,255,255,0.92);
  --t2: rgba(255,255,255,0.50);
  --t3: rgba(255,255,255,0.28);
  --sep: rgba(255,255,255,0.06);

  --r: 14px;
  --r-lg: 20px;
}

html{font-size:16px}
body{
  font-family: -apple-system,'SF Pro Display','SF Pro Text',system-ui,sans-serif;
  height:100dvh;
  background:#0a0a12;
  color:var(--t1);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* ===== Ambient BG ===== */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 55% 45% at 20% 15%, rgba(10,132,255,0.18), transparent),
    radial-gradient(ellipse 45% 50% at 80% 25%, rgba(88,86,214,0.14), transparent),
    radial-gradient(ellipse 40% 35% at 55% 85%, rgba(48,209,88,0.08), transparent);
}

.orb{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform;opacity:.5}
.orb-1{width:280px;height:280px;background:rgba(10,132,255,.3);top:-5%;left:-8%;animation:f1 22s ease-in-out infinite}
.orb-2{width:220px;height:220px;background:rgba(88,86,214,.25);top:30%;right:-10%;animation:f2 18s ease-in-out infinite}
.orb-3{width:180px;height:180px;background:rgba(48,209,88,.15);bottom:8%;left:15%;animation:f3 25s ease-in-out infinite}

@keyframes f1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(35px,25px) scale(1.08)}}
@keyframes f2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-25px,-18px) scale(1.06)}}
@keyframes f3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-20px) scale(1.04)}}

/* ===== Glass ===== */
.glass{
  background:var(--glass);
  backdrop-filter:blur(var(--blur)) saturate(1.4);
  -webkit-backdrop-filter:blur(var(--blur)) saturate(1.4);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  box-shadow:0 4px 24px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.05);
}

/* ===== App ===== */
.app{
  position:relative;z-index:1;
  max-width:430px;margin:0 auto;height:100dvh;
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  padding:0 16px 92px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.app::-webkit-scrollbar{display:none}

/* ===== Status Bar ===== */
.sbar{display:flex;justify-content:space-between;align-items:center;padding:14px 4px 6px;font-size:15px;font-weight:600;flex-shrink:0}

/* ===== Title ===== */
.title{font-size:26px;font-weight:700;letter-spacing:-.3px;padding:2px 0 16px;flex-shrink:0}

/* ===== Task Types ===== */
.types{padding:14px;margin-bottom:14px;flex-shrink:0;animation:rise .45s ease-out both}

.types-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

.types-lbl{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.5px;text-transform:uppercase}

.types-n{
  font-size:11px;font-weight:600;
  color:var(--blue);background:var(--blue-d);
  padding:2px 9px;border-radius:20px;
  transition:all .2s;
}

.types-tags{display:flex;flex-wrap:wrap;gap:8px}

.tg{
  padding:7px 15px;
  border-radius:100px;
  font-size:13px;font-weight:500;
  cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:all .25s cubic-bezier(.25,1,.5,1);
  border:1px solid var(--border-l);
  background:rgba(255,255,255,.03);
  color:var(--t2);
}

.tg:active{transform:scale(.95)}

.tg.on{
  color:var(--w);
  background:rgba(10,132,255,.18);
  border-color:rgba(10,132,255,.35);
}

/* ===== Exec ===== */
.exec-w{margin-bottom:14px;flex-shrink:0;animation:rise .5s ease-out both;animation-delay:.03s}

.exec{
  width:100%;padding:14px 0;border:none;
  font-family:inherit;font-size:16px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  -webkit-tap-highlight-color:transparent;
  border-radius:var(--r);transition:all .2s;
}

.exec--go{background:var(--blue);color:var(--w)}
.exec--go:active{opacity:.85;transform:scale(.99)}
.exec--go svg{fill:var(--w);stroke:none}

.exec--stop{
  background:var(--red-d);color:var(--red);
  border:1px solid rgba(255,69,58,.2);
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  border-radius:var(--r);
}
.exec--stop:active{opacity:.85}

.pd{width:6px;height:6px;border-radius:50%;background:var(--red);position:relative}
.pd::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:1.5px solid var(--red);animation:ping 1.4s ease-out infinite}
@keyframes ping{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.5);opacity:0}}
.dots span{animation:blink 1.4s infinite both}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:.8}}

/* ===== Liquid Tabs ===== */
.tabs-w{flex-shrink:0;animation:rise .55s ease-out both;animation-delay:.05s}

.seg{
  display:flex;position:relative;padding:3px;margin-bottom:12px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-l);
  border-radius:12px;
}

.seg-pill{
  position:absolute;top:3px;left:3px;
  width:calc(50% - 3px);height:calc(100% - 6px);
  background:rgba(255,255,255,.12);
  border-radius:9px;
  transition:transform .4s cubic-bezier(.25,1,.5,1);
  box-shadow:0 2px 8px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.06);
  z-index:0;
}

.seg-pill[data-i="1"]{transform:translateX(100%)}

.seg-b{
  flex:1;padding:8px 0;border:none;background:transparent;
  font-family:inherit;font-size:13px;font-weight:600;
  color:var(--t2);cursor:pointer;
  position:relative;z-index:1;border-radius:9px;
  transition:color .3s;-webkit-tap-highlight-color:transparent;
}

.seg-b.on{color:var(--w)}

/* ===== Log ===== */
.log-w{flex:1;min-height:0;animation:rise .6s ease-out both;animation-delay:.07s}

.log-c{height:100%;display:flex;flex-direction:column;padding:0}

.log-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px}

.log-l{font-size:12px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.4px}

.btn-c{
  padding:4px 12px;border:none;border-radius:20px;
  background:rgba(255,255,255,.06);color:var(--t2);
  font-family:inherit;font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.btn-c:active{background:rgba(255,255,255,.1)}

.log-s{flex:1;overflow-y:auto;padding:0 8px 10px;scrollbar-width:none}
.log-s::-webkit-scrollbar{display:none}

.log-ul{list-style:none}

.log-i{display:flex;gap:10px;padding:10px 8px;border-radius:8px;animation:fi .25s ease-out both}
.log-i+.log-i{border-top:.5px solid var(--sep)}

.d{width:5px;height:5px;border-radius:50%;margin-top:7px;flex-shrink:0}
.d-ok{background:var(--green);box-shadow:0 0 6px rgba(48,209,88,.3)}
.d-er{background:var(--red);box-shadow:0 0 6px rgba(255,69,58,.3)}

.log-b{flex:1;min-width:0}
.log-m{font-size:14px;font-weight:400;color:var(--t1);line-height:1.4}
.log-f{display:flex;align-items:center;gap:6px;margin-top:2px}
.log-t{font-size:11px;color:var(--t3);font-variant-numeric:tabular-nums}
.log-g{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500}
.g-b{background:var(--blue-d);color:var(--blue)}
.g-g{background:var(--green-d);color:var(--green)}
.g-o{background:rgba(255,159,10,.12);color:var(--orange)}

.log-e{text-align:center;padding:44px 20px;color:var(--t3);font-size:14px}
.log-ei{
  width:40px;height:40px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border-l);
  display:flex;align-items:center;justify-content:center;margin:0 auto 10px;
}
.log-ei svg{width:18px;height:18px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round}

@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* ===== Nav ===== */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100}

.nav-in{
  display:flex;justify-content:space-around;align-items:center;
  padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom,8px));
  background:rgba(10,10,18,.55);
  backdrop-filter:blur(48px) saturate(1.6);-webkit-backdrop-filter:blur(48px) saturate(1.6);
  border-top:1px solid var(--border-l);
}

.nv{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:4px 16px}
.nv svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all .2s}
.nv span{font-size:10px;font-weight:500;color:var(--t3);transition:color .2s}
.nv.act svg{stroke:var(--blue);filter:drop-shadow(0 0 6px rgba(10,132,255,.3))}
.nv.act span{color:var(--blue)}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
::selection{background:rgba(10,132,255,.3)}
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="app">
  <div class="sbar">
    <span style="font-weight:600">5:38</span>
    <div style="display:flex;gap:5px;align-items:center;opacity:.55">
      <svg width="15" height="11" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx=".5" opacity=".3"/><rect x="4.5" y="5" width="3" height="7" rx=".5" opacity=".5"/><rect x="9" y="2" width="3" height="10" rx=".5" opacity=".8"/><rect x="13.5" y="0" width="3" height="12" rx=".5"/></svg>
      <svg width="20" height="11" viewBox="0 0 22 12" fill="currentColor"><rect x="0" y="1" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1" fill="none"/><rect x="19" y="3.5" width="2" height="5" rx=".5"/><rect x="2" y="3" width="12" height="6" rx="1"/></svg>
    </div>
  </div>

  <div class="title">任务自动化</div>

  <div class="types glass" id="tc"></div>

  <div class="exec-w">
    <button class="exec exec--go" id="eb" onclick="go()">
      <svg width="13" height="13" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      开始执行
    </button>
  </div>

  <div class="tabs-w">
    <div class="seg">
      <div class="seg-pill" id="sp" data-i="0"></div>
      <button class="seg-b on" onclick="sw(0,this)">当前任务</button>
      <button class="seg-b" onclick="sw(1,this)">任务列表</button>
    </div>
  </div>

  <div class="log-w">
    <div class="log-c glass">
      <div class="log-hd">
        <span class="log-l" id="ll">运行日志</span>
        <button class="btn-c" onclick="cl()">清除</button>
      </div>
      <div class="log-s">
        <ul class="log-ul" id="lu">
          <li class="log-e" id="ee">
            <div class="log-ei"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/></svg></div>
            暂无日志记录
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>

<nav class="nav">
  <div class="nav-in">
    <a class="nv act"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 14 15 14 15 21"/></svg><span>首页</span></a>
    <a class="nv"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="15" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>出款</span></a>
    <a class="nv"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>记录</span></a>
    <a class="nv"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>设置</span></a>
  </div>
</nav>

<script>
const T = ['创建助记词','派生钱包','转账','质押操作','解除质押','释放质押','委托资源','取消委托','投票','获取收益'];
const sel = new Set(T);
let on = false, tm = null, n = 0;

function rr() {
  document.getElementById('tc').innerHTML = `
    <div class="types-hd">
      <span class="types-lbl">允许的任务类型</span>
      <span class="types-n" id="tn">${sel.size} / ${T.length}</span>
    </div>
    <div class="types-tags">${T.map(x =>
      `<span class="tg${sel.has(x) ? ' on' : ''}" role="checkbox" tabindex="0" onclick="fl(this,'${x}')">${x}</span>`
    ).join('')}</div>`;
}

function fl(el, x) {
  sel.has(x) ? sel.delete(x) : sel.add(x);
  el.classList.toggle('on');
  document.getElementById('tn').textContent = `${sel.size} / ${T.length}`;
}

function sw(i, b) {
  document.getElementById('sp').setAttribute('data-i', i);
  document.querySelectorAll('.seg-b').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  document.getElementById('ll').textContent = i === 0 ? '运行日志' : '任务队列';
}

function go() {
  on = !on;
  const b = document.getElementById('eb');
  if (on) {
    b.className = 'exec exec--stop';
    b.innerHTML = '<span class="pd"></span>正在执行，点击停止<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
    sl();
  } else {
    b.className = 'exec exec--go';
    b.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="6,3 20,12 6,21"/></svg>开始执行';
    clearInterval(tm);
  }
}

const GG = ['g-b','g-g','g-o'];

function al(m, s, e) {
  const l = document.getElementById('lu');
  const em = document.getElementById('ee');
  if (em) em.remove();
  n++;
  const d = new Date();
  const t = [d.getHours(), d.getMinutes(), d.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');
  const c = GG[Math.floor(Math.random() * GG.length)];
  const li = document.createElement('li');
  li.className = 'log-i';
  li.innerHTML = `<span class="d ${e ? 'd-er' : 'd-ok'}"></span><div class="log-b"><div class="log-m">${m}</div><div class="log-f"><span class="log-t">${t}</span><span class="log-g ${c}">${s}</span></div></div>`;
  l.insertBefore(li, l.firstChild);
  if (l.children.length > 50) l.removeChild(l.lastChild);
}

function cl() {
  document.getElementById('lu').innerHTML = `<li class="log-e" id="ee"><div class="log-ei"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="3"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/></svg></div>暂无日志记录</li>`;
  n = 0;
}

const MS = [
  ['成功加载 10 个任务','主页-定时'],['成功加载 10 个任务','任务列表'],
  ['钱包派生完成 #A3F2','派生引擎'],['转账 120 TRX → TQn...x8K','转账模块'],
  ['质押 500 TRX 成功','质押系统'],['委托带宽 1000 → TJd...m2','委托'],
  ['投票 SuperNode #17 成功','投票'],['收益领取 12.5 TRX','收益'],
  ['助记词已安全创建','密钥管理'],['释放质押 200 TRX 已提交','释放'],
];

function sl() {
  clearInterval(tm);
  tm = setInterval(() => {
    if (!on) return;
    const [m, s] = MS[Math.floor(Math.random() * MS.length)];
    const e = Math.random() < .05;
    al(e ? '网络超时，正在重试…' : m, s, e);
  }, 2200);
}

rr();
</script>
</body>
</html>
